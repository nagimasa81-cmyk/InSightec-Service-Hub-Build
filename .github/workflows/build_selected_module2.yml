name: Build Selected Module KAI

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module folder"
        required: true
        type: choice
        options:
          - HUB
          - Complaint_service_hub
          - InSightec_Service_hub
          - Log_explorer
          - Water_system_analyzer

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      NUITKA_ASSUME_YES_FOR_DOWNLOADS: "yes"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        id: setup_python_313
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Fallback to Python 3.14
        if: steps.setup_python_313.outcome != 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64

      - name: Initialize Build Environment
        id: init
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $outputRoot = Join-Path $env:RUNNER_TEMP "module_build"
          $logRoot = Join-Path $outputRoot "build_logs"
          $packageRoot = Join-Path $outputRoot "distribution"

          if (Test-Path -LiteralPath $outputRoot) {
            Remove-Item -LiteralPath $outputRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $logRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          "output_root=$outputRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "log_root=$logRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "package_root=$packageRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "Output root : $outputRoot"
          Write-Host "Log root    : $logRoot"
          Write-Host "Package root: $packageRoot"

      - name: Show Environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python --version
          python -m pip --version
          Write-Host "Selected module: ${{ inputs.module }}"
          Write-Host "Workspace      : $env:GITHUB_WORKSPACE"

      - name: Upgrade Build Tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade pyinstaller nuitka ordered-set zstandard

      - name: Extract Latest Source ZIP and Detect Build Method
        id: detect
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $modulePath = Join-Path $env:GITHUB_WORKSPACE "Module\$module"
          $work = Join-Path $modulePath "work"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $detectLog = Join-Path $logRoot "detect.log"

          try {
            if ([string]::IsNullOrWhiteSpace($module)) {
              throw "Selected module is empty."
            }

            if ([string]::IsNullOrWhiteSpace($modulePath)) {
              throw "Module path resolved to an empty value."
            }

            Write-Host "Selected module: $module"
            Write-Host "Module path    : $modulePath"

            if (!(Test-Path -LiteralPath $modulePath)) {
              throw "Module folder not found: $modulePath"
            }

            Write-Host ""
            Write-Host "Files found under the module folder:"
            $allModuleFiles = @(
              Get-ChildItem -LiteralPath $modulePath -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.FullName -notmatch '\\work\\' -and
                  $_.FullName -notmatch '\\dist\\' -and
                  $_.FullName -notmatch '\\build\\' -and
                  $_.FullName -notmatch '\\release\\' -and
                  $_.FullName -notmatch '\\output\\'
                } |
                Sort-Object FullName
            )

            if ($allModuleFiles.Count -eq 0) {
              Write-Host "  (No files found)"
            } else {
              foreach ($file in $allModuleFiles) {
                Write-Host "  - $($file.FullName)"
              }
            }

            Write-Host ""
            Write-Host "ZIP files found:"
            $allZipFiles = @(
              $allModuleFiles |
                Where-Object { $_.Extension -ieq ".zip" } |
                Sort-Object LastWriteTimeUtc -Descending
            )

            if ($allZipFiles.Count -eq 0) {
              Write-Host "  (No ZIP files found)"
            } else {
              foreach ($zip in $allZipFiles) {
                Write-Host "  - $($zip.Name)"
              }
            }

            # Primary rule:
            # Only ZIP files ending with _SOURCE.zip are build-source candidates.
            # This safely allows names containing BUILTIN, PLUGIN, etc.
            $sourceZips = @(
              $allZipFiles |
                Where-Object {
                  $_.Name -match '(?i)_SOURCE\.zip$'
                } |
                Sort-Object LastWriteTimeUtc -Descending
            )

            # Compatibility fallback:
            # If no *_SOURCE.zip exists, accept a ZIP that contains "source"
            # but exclude known update/distribution packages.
            if ($sourceZips.Count -eq 0) {
              Write-Host ""
              Write-Warning "No ZIP ending with _SOURCE.zip was found."
              Write-Warning "Trying compatibility fallback for older source ZIP names."

              $sourceZips = @(
                $allZipFiles |
                  Where-Object {
                    $_.BaseName -match '(?i)source' -and
                    $_.Name -notmatch '(?i)(program[_ -]?update|master[_ -]?update|plugin[_ -]?update|filetype[_ -]?update|artifact|distribution)'
                  } |
                  Sort-Object LastWriteTimeUtc -Descending
              )
            }

            if ($sourceZips.Count -eq 0) {
              $zipList = if ($allZipFiles.Count -gt 0) {
                ($allZipFiles | ForEach-Object { $_.Name }) -join ", "
              } else {
                "(none)"
              }

              throw "No build Source ZIP was found under: $modulePath`nExpected naming: *_SOURCE.zip`nZIP files found: $zipList"
            }

            $latestZip = $sourceZips[0]

            Write-Host ""
            Write-Host "Selected Source ZIP:"
            Write-Host "  $($latestZip.FullName)"
            Write-Host "Last modified:"
            Write-Host "  $($latestZip.LastWriteTimeUtc.ToString('yyyy-MM-dd HH:mm:ss')) UTC"

            if (Test-Path -LiteralPath $work) {
              Remove-Item -LiteralPath $work -Recurse -Force
            }

            New-Item -ItemType Directory -Force -Path $work | Out-Null

            try {
              Expand-Archive -LiteralPath $latestZip.FullName -DestinationPath $work -Force
            }
            catch {
              throw "Failed to extract Source ZIP: $($latestZip.FullName)`n$($_.Exception.Message)"
            }

            $children = @(
              Get-ChildItem -LiteralPath $work -Force |
                Where-Object { $_.Name -ne "__MACOSX" }
            )

            if ($children.Count -eq 0) {
              throw "Source ZIP was extracted, but the work folder is empty: $work"
            }

            if ($children.Count -eq 1 -and $children[0].PSIsContainer) {
              $sourceRoot = $children[0].FullName
            } else {
              $sourceRoot = $work
            }

            if ([string]::IsNullOrWhiteSpace($sourceRoot) -or !(Test-Path -LiteralPath $sourceRoot)) {
              throw "Source root is empty or invalid: '$sourceRoot'"
            }

            Write-Host ""
            Write-Host "Source root contents:"
            Get-ChildItem -LiteralPath $sourceRoot -Force |
              ForEach-Object {
                $kind = if ($_.PSIsContainer) { "[DIR] " } else { "[FILE]" }
                Write-Host "  $kind $($_.Name)"
              }

            $preferredBatNames = @(
              "01_BUILD_EXE_NUITKA.bat",
              "01_BUILD_EXE.bat",
              "Build_Hub_EXE_PyInstaller.bat",
              "Build_Hub_EXE_PyInstaller_FIXED.bat",
              "BUILD_EXE_NUITKA.bat",
              "BUILD_EXE.bat"
            )

            $buildFile = $null
            $method = $null

            foreach ($name in $preferredBatNames) {
              $buildFile = Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -Filter $name -ErrorAction SilentlyContinue |
                Sort-Object { $_.FullName.Length }, FullName |
                Select-Object -First 1

              if ($buildFile) {
                $method = "bat"
                break
              }
            }

            if (-not $buildFile) {
              $buildFile = Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -Filter *.bat -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.Name -match '(?i)build.*exe|exe.*build' -or
                  $_.Name -match '^01_'
                } |
                Sort-Object { $_.FullName.Length }, FullName |
                Select-Object -First 1

              if ($buildFile) {
                $method = "bat"
              }
            }

            if (-not $buildFile) {
              $buildFile = Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -Filter *.spec -ErrorAction SilentlyContinue |
                Sort-Object { $_.FullName.Length }, FullName |
                Select-Object -First 1

              if ($buildFile) {
                $method = "spec"
              }
            }

            if (-not $buildFile) {
              $entryNames = @(
                "main.py",
                "app.py",
                "launcher.py",
                "LogMergeTool_NoExcel_Main.py"
              )

              foreach ($name in $entryNames) {
                $buildFile = Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -Filter $name -ErrorAction SilentlyContinue |
                  Sort-Object { $_.FullName.Length }, FullName |
                  Select-Object -First 1

                if ($buildFile) {
                  $method = "nuitka"
                  break
                }
              }
            }

            if (-not $buildFile) {
              throw "No build BAT, PyInstaller .spec, main.py, app.py, launcher.py, or LogMergeTool_NoExcel_Main.py was found."
            }

            $buildPath = $buildFile.DirectoryName

            if ([string]::IsNullOrWhiteSpace($buildPath)) {
              throw "Detected build path is empty. Build file: $($buildFile.FullName)"
            }

            if (!(Test-Path -LiteralPath $buildPath)) {
              throw "Detected build path does not exist: $buildPath"
            }

            @(
              "Module      : $module"
              "Source ZIP  : $($latestZip.FullName)"
              "Source root : $sourceRoot"
              "Method      : $method"
              "Build file  : $($buildFile.FullName)"
              "Build path  : $buildPath"
            ) | Tee-Object -FilePath $detectLog

            "method=$method" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "build_file=$($buildFile.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "build_name=$($buildFile.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "build_path=$buildPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "source_zip=$($latestZip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          catch {
            $_ | Out-String | Tee-Object -FilePath $detectLog
            throw
          }

      - name: Validate Detection Outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $method = "${{ steps.detect.outputs.method }}"
          $buildFile = "${{ steps.detect.outputs.build_file }}"
          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $sourceZip = "${{ steps.detect.outputs.source_zip }}"

          if ([string]::IsNullOrWhiteSpace($method)) {
            throw "Detection output 'method' is empty."
          }

          if ([string]::IsNullOrWhiteSpace($sourceZip) -or !(Test-Path -LiteralPath $sourceZip)) {
            throw "Detection output 'source_zip' is empty or invalid: '$sourceZip'"
          }

          if ([string]::IsNullOrWhiteSpace($buildFile) -or !(Test-Path -LiteralPath $buildFile)) {
            throw "Detection output 'build_file' is empty or invalid: '$buildFile'"
          }

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "Detection output 'build_path' is empty or invalid: '$buildPath'"
          }

          if ([string]::IsNullOrWhiteSpace($sourceRoot) -or !(Test-Path -LiteralPath $sourceRoot)) {
            throw "Detection output 'source_root' is empty or invalid: '$sourceRoot'"
          }

          Write-Host "Detection outputs validated successfully."
          Write-Host "Source ZIP : $sourceZip"
          Write-Host "Build file: $buildFile"
          Write-Host "Method    : $method"

      - name: Install Requirements
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $logFile = Join-Path $logRoot "requirements.log"

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "Cannot install requirements because build path is invalid: '$buildPath'"
          }

          Set-Location -LiteralPath $buildPath

          $requirements = @(
            Get-ChildItem -LiteralPath $buildPath -File -Filter "requirements*.txt" -ErrorAction SilentlyContinue
            Get-ChildItem -LiteralPath $sourceRoot -File -Filter "requirements*.txt" -ErrorAction SilentlyContinue
          ) | Sort-Object FullName -Unique

          if ($requirements.Count -eq 0) {
            "No requirements file found." | Tee-Object -FilePath $logFile
          } else {
            foreach ($req in $requirements) {
              "Installing: $($req.FullName)" | Tee-Object -FilePath $logFile -Append

              python -m pip install -r "$($req.FullName)" 2>&1 |
                Tee-Object -FilePath $logFile -Append

              if ($LASTEXITCODE -ne 0) {
                throw "Requirement installation failed: $($req.FullName)"
              }
            }
          }

      - name: Prepare Build BAT for GitHub Actions
        if: steps.detect.outputs.method == 'bat'
        id: prepare_bat
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $batPath = "${{ steps.detect.outputs.build_file }}"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $preparedBat = Join-Path (Split-Path -Parent $batPath) "GITHUB_ACTIONS_BUILD.bat"

          if ([string]::IsNullOrWhiteSpace($batPath) -or !(Test-Path -LiteralPath $batPath)) {
            throw "Build BAT path is empty or invalid: '$batPath'"
          }

          $content = Get-Content -LiteralPath $batPath -Raw

          $content = $content -replace '(?im)^\s*set\s+PYEXE=.*$', 'set PYEXE=python'
          $content = $content -replace '(?im)^\s*if\s+errorlevel\s+1\s+set\s+PYEXE=.*$', 'rem Python fallback is controlled by GitHub Actions'
          $content = $content -replace '(?im)^\s*pause\s*$', 'rem pause removed for GitHub Actions'

          if ($content -match '(?i)-m\s+nuitka' -and
              $content -notmatch '(?i)--assume-yes-for-downloads') {
            $content = $content -replace '(?i)(-m\s+nuitka\b)', '$1 --assume-yes-for-downloads'
          }

          Set-Content -LiteralPath $preparedBat -Value $content -Encoding ASCII

          "prepared_bat=$preparedBat" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Get-Content -LiteralPath $preparedBat |
            Out-File -FilePath (Join-Path $logRoot "prepared_build_bat.txt") -Encoding utf8

          Write-Host "Prepared BAT: $preparedBat"

      - name: Run Build BAT
        if: steps.detect.outputs.method == 'bat'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $preparedBat = "${{ steps.prepare_bat.outputs.prepared_bat }}"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $logFile = Join-Path $logRoot "build.log"

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "Cannot run BAT because build path is invalid: '$buildPath'"
          }

          if ([string]::IsNullOrWhiteSpace($preparedBat) -or !(Test-Path -LiteralPath $preparedBat)) {
            throw "Prepared build BAT not found: '$preparedBat'"
          }

          Set-Location -LiteralPath $buildPath

          cmd.exe /d /s /c "call `"$preparedBat`"" 2>&1 |
            Tee-Object -FilePath $logFile

          if ($LASTEXITCODE -ne 0) {
            throw "Build BAT failed with exit code $LASTEXITCODE"
          }

      - name: Build from PyInstaller Spec
        if: steps.detect.outputs.method == 'spec'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $buildFile = "${{ steps.detect.outputs.build_file }}"
          $logFile = Join-Path "${{ steps.init.outputs.log_root }}" "build.log"

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "PyInstaller build path is invalid: '$buildPath'"
          }

          if ([string]::IsNullOrWhiteSpace($buildFile) -or !(Test-Path -LiteralPath $buildFile)) {
            throw "PyInstaller spec file is invalid: '$buildFile'"
          }

          Set-Location -LiteralPath $buildPath

          python -m PyInstaller --noconfirm "$buildFile" 2>&1 |
            Tee-Object -FilePath $logFile

          if ($LASTEXITCODE -ne 0) {
            throw "PyInstaller build failed with exit code $LASTEXITCODE"
          }

      - name: Direct Nuitka Build
        if: steps.detect.outputs.method == 'nuitka'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $buildFile = "${{ steps.detect.outputs.build_file }}"
          $logFile = Join-Path "${{ steps.init.outputs.log_root }}" "build.log"

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "Nuitka build path is invalid: '$buildPath'"
          }

          if ([string]::IsNullOrWhiteSpace($buildFile) -or !(Test-Path -LiteralPath $buildFile)) {
            throw "Nuitka entry file is invalid: '$buildFile'"
          }

          Set-Location -LiteralPath $buildPath

          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=build `
            "$buildFile" 2>&1 |
            Tee-Object -FilePath $logFile

          if ($LASTEXITCODE -ne 0) {
            throw "Nuitka build failed with exit code $LASTEXITCODE"
          }


      - name: Resolve Artifact Name and Version
        id: metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $sourceZip = "${{ steps.detect.outputs.source_zip }}"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $metadataLog = Join-Path $logRoot "artifact_metadata.log"

          if ([string]::IsNullOrWhiteSpace($sourceRoot) -or !(Test-Path -LiteralPath $sourceRoot)) {
            throw "Cannot resolve artifact metadata because source root is invalid: '$sourceRoot'"
          }

          if ([string]::IsNullOrWhiteSpace($sourceZip) -or !(Test-Path -LiteralPath $sourceZip)) {
            throw "Cannot resolve artifact metadata because source ZIP is invalid: '$sourceZip'"
          }

          $pythonVersion = (
            python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')"
          ).Trim()

          if ([string]::IsNullOrWhiteSpace($pythonVersion)) {
            throw "Could not determine the active Python version."
          }

          $sourceBase = [System.IO.Path]::GetFileNameWithoutExtension($sourceZip)
          $appVersion = $null
          $versionSource = $null

          $jsonCandidates = @(
            Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -match '(?i)^(version|manifest|app_manifest|build_info)\.json$'
              } |
              Sort-Object { $_.FullName.Length }, FullName
          )

          foreach ($file in $jsonCandidates) {
            try {
              $json = Get-Content -LiteralPath $file.FullName -Raw | ConvertFrom-Json

              foreach ($propertyName in @(
                "version",
                "app_version",
                "application_version",
                "build_version"
              )) {
                $property = $json.PSObject.Properties[$propertyName]

                if ($property -and
                    -not [string]::IsNullOrWhiteSpace([string]$property.Value)) {
                  $appVersion = ([string]$property.Value).Trim()
                  $versionSource = $file.FullName
                  break
                }
              }
            }
            catch {
              Write-Warning "Could not parse JSON metadata: $($file.FullName)"
            }

            if ($appVersion) {
              break
            }
          }

          if (-not $appVersion) {
            $textCandidates = @(
              Get-ChildItem -LiteralPath $sourceRoot -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.Extension -in @(".py", ".toml") -and
                  $_.FullName -notmatch '\\site-packages\\'
                } |
                Sort-Object { $_.FullName.Length }, FullName
            )

            foreach ($file in $textCandidates) {
              try {
                $content = Get-Content -LiteralPath $file.FullName -Raw

                $patterns = @(
                  '(?im)^\s*(?:__version__|APP_VERSION|APPLICATION_VERSION|VERSION)\s*=\s*["'']([^"'']+)["'']',
                  '(?im)^\s*version\s*=\s*["'']([^"'']+)["'']'
                )

                foreach ($pattern in $patterns) {
                  $match = [regex]::Match($content, $pattern)

                  if ($match.Success) {
                    $appVersion = $match.Groups[1].Value.Trim()
                    $versionSource = $file.FullName
                    break
                  }
                }
              }
              catch {
                Write-Warning "Could not inspect version file: $($file.FullName)"
              }

              if ($appVersion) {
                break
              }
            }
          }

          if (-not $appVersion) {
            $versionMatch = [regex]::Match(
              $sourceBase,
              '(?i)(\d+\.\d+\.\d+(?:[-_.][A-Za-z0-9]+)*)'
            )

            if ($versionMatch.Success) {
              $appVersion = $versionMatch.Groups[1].Value
              $versionSource = "Source ZIP filename"
            }
          }

          if (-not $appVersion) {
            $appVersion = "unversioned"
            $versionSource = "Fallback"
          }

          $commitMatch = [regex]::Match(
            $sourceBase,
            '(?i)(commit[_-]?\d+(?:[_-]?r\d+)?)'
          )

          $commitTag = if ($commitMatch.Success) {
            $commitMatch.Groups[1].Value -replace '_', '-'
          } else {
            "source"
          }

          $safeModule = $module -replace '[^A-Za-z0-9_.-]', '_'
          $safeVersion = $appVersion -replace '[^A-Za-z0-9_.-]', '_'
          $safeCommit = $commitTag -replace '[^A-Za-z0-9_.-]', '_'

          if ($safeVersion -match [regex]::Escape($safeCommit)) {
            $artifactName = "${safeModule}_${safeVersion}_Python${pythonVersion}_Standalone"
          } else {
            $artifactName = "${safeModule}_${safeVersion}_${safeCommit}_Python${pythonVersion}_Standalone"
          }

          @(
            "Module         : $module"
            "Source ZIP     : $sourceZip"
            "Source base    : $sourceBase"
            "App version    : $appVersion"
            "Version source : $versionSource"
            "Commit tag     : $commitTag"
            "Python version : $pythonVersion"
            "Artifact name  : $artifactName"
          ) | Tee-Object -FilePath $metadataLog

          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "commit_tag=$commitTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "python_version=$pythonVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Validate and Prepare Standalone Artifact
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $sourceZip = "${{ steps.detect.outputs.source_zip }}"
          $packageRoot = "${{ steps.init.outputs.package_root }}"
          $logRoot = "${{ steps.init.outputs.log_root }}"
          $artifactName = "${{ steps.metadata.outputs.artifact_name }}"
          $appVersion = "${{ steps.metadata.outputs.app_version }}"
          $commitTag = "${{ steps.metadata.outputs.commit_tag }}"
          $pythonVersion = "${{ steps.metadata.outputs.python_version }}"
          $packageLog = Join-Path $logRoot "package.log"

          if ([string]::IsNullOrWhiteSpace($sourceRoot) -or !(Test-Path -LiteralPath $sourceRoot)) {
            throw "Cannot package because source root is invalid: '$sourceRoot'"
          }

          if ([string]::IsNullOrWhiteSpace($buildPath) -or !(Test-Path -LiteralPath $buildPath)) {
            throw "Cannot package because build path is invalid: '$buildPath'"
          }

          if ([string]::IsNullOrWhiteSpace($artifactName)) {
            throw "Artifact name is empty."
          }

          if (Test-Path -LiteralPath $packageRoot) {
            Remove-Item -LiteralPath $packageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          $searchRoots = @($buildPath, $sourceRoot) |
            Where-Object {
              -not [string]::IsNullOrWhiteSpace($_) -and
              (Test-Path -LiteralPath $_)
            } |
            Sort-Object -Unique

          $candidates = New-Object System.Collections.Generic.List[object]

          foreach ($root in $searchRoots) {
            $nuitkaDirs = @(
              Get-ChildItem -LiteralPath $root -Recurse -Directory -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.Name -like "*.dist" -and
                  $_.FullName -notmatch '\\site-packages\\'
                }
            )

            foreach ($dir in $nuitkaDirs) {
              $exe = Get-ChildItem -LiteralPath $dir.FullName -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue |
                Select-Object -First 1

              if ($exe) {
                $candidates.Add([pscustomobject]@{
                  Kind = "Nuitka"
                  Root = $dir.FullName
                  Exe = $exe.FullName
                  Modified = $exe.LastWriteTimeUtc
                  Depth = $dir.FullName.Length
                })
              }
            }

            $pyInstallerDirs = @(
              Get-ChildItem -LiteralPath $root -Recurse -Directory -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.Name -eq "dist" -and
                  $_.FullName -notmatch '\\site-packages\\'
                }
            )

            foreach ($dist in $pyInstallerDirs) {
              $directExe = Get-ChildItem -LiteralPath $dist.FullName -File -Filter *.exe -ErrorAction SilentlyContinue |
                Select-Object -First 1

              if ($directExe) {
                $candidates.Add([pscustomobject]@{
                  Kind = "PyInstaller"
                  Root = $dist.FullName
                  Exe = $directExe.FullName
                  Modified = $directExe.LastWriteTimeUtc
                  Depth = $dist.FullName.Length
                })
                continue
              }

              foreach ($child in @(Get-ChildItem -LiteralPath $dist.FullName -Directory -ErrorAction SilentlyContinue)) {
                $childExe = Get-ChildItem -LiteralPath $child.FullName -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue |
                  Select-Object -First 1

                if ($childExe) {
                  $candidates.Add([pscustomobject]@{
                    Kind = "PyInstaller"
                    Root = $child.FullName
                    Exe = $childExe.FullName
                    Modified = $childExe.LastWriteTimeUtc
                    Depth = $child.FullName.Length
                  })
                }
              }
            }
          }

          if ($candidates.Count -eq 0) {
            "Directories found below build path:" |
              Tee-Object -FilePath $packageLog -Append

            Get-ChildItem -LiteralPath $buildPath -Recurse -Directory -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName |
              Tee-Object -FilePath $packageLog -Append

            throw "No valid Nuitka .dist or PyInstaller standalone output was found."
          }

          $selected = $candidates |
            Sort-Object `
              @{ Expression = "Modified"; Descending = $true }, `
              @{ Expression = "Depth"; Descending = $false } |
            Select-Object -First 1

          "Selected build output:" | Tee-Object -FilePath $packageLog
          "  Kind: $($selected.Kind)" | Tee-Object -FilePath $packageLog -Append
          "  Root: $($selected.Root)" | Tee-Object -FilePath $packageLog -Append
          "  EXE : $($selected.Exe)" | Tee-Object -FilePath $packageLog -Append

          Get-ChildItem -LiteralPath $selected.Root -Force |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Recurse -Force
            }

          $packagedExeFiles = @(
            Get-ChildItem -LiteralPath $packageRoot -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue
          )

          if ($packagedExeFiles.Count -eq 0) {
            throw "No EXE was found after copying standalone output to: $packageRoot"
          }

          $rootFiles = @(
            Get-ChildItem -LiteralPath $packageRoot -File -Force -ErrorAction SilentlyContinue
          )
          $rootDirs = @(
            Get-ChildItem -LiteralPath $packageRoot -Directory -Force -ErrorAction SilentlyContinue
          )

          if ($rootFiles.Count -eq 0 -and $rootDirs.Count -eq 1) {
            $wrapper = $rootDirs[0]
            $temporaryFlatten = Join-Path "${{ steps.init.outputs.output_root }}" "flatten_payload"

            if (Test-Path -LiteralPath $temporaryFlatten) {
              Remove-Item -LiteralPath $temporaryFlatten -Recurse -Force
            }

            New-Item -ItemType Directory -Force -Path $temporaryFlatten | Out-Null

            Get-ChildItem -LiteralPath $wrapper.FullName -Force |
              ForEach-Object {
                Copy-Item -LiteralPath $_.FullName -Destination $temporaryFlatten -Recurse -Force
              }

            Remove-Item -LiteralPath $packageRoot -Recurse -Force
            New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

            Get-ChildItem -LiteralPath $temporaryFlatten -Force |
              ForEach-Object {
                Copy-Item -LiteralPath $_.FullName -Destination $packageRoot -Recurse -Force
              }

            Remove-Item -LiteralPath $temporaryFlatten -Recurse -Force

            "Flattened one extra wrapper directory: $($wrapper.Name)" |
              Tee-Object -FilePath $packageLog -Append
          }

          $packagedExeFiles = @(
            Get-ChildItem -LiteralPath $packageRoot -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue
          )

          if ($packagedExeFiles.Count -eq 0) {
            throw "No EXE exists in the final artifact folder: $packageRoot"
          }

          $primaryExe = $packagedExeFiles |
            Sort-Object { $_.FullName.Length }, FullName |
            Select-Object -First 1

          @(
            "Artifact Name : $artifactName"
            "Module        : $module"
            "App Version   : $appVersion"
            "Commit Tag    : $commitTag"
            "Python        : $pythonVersion"
            "Source ZIP    : $([System.IO.Path]::GetFileName($sourceZip))"
            "Build Method  : ${{ steps.detect.outputs.method }}"
            "Primary EXE   : $($primaryExe.Name)"
            "GitHub Run    : ${{ github.run_number }}"
            "Git SHA       : ${{ github.sha }}"
          ) | Set-Content -LiteralPath (Join-Path $packageRoot "BUILD_INFO.txt") -Encoding utf8

          "Final artifact root contents:" |
            Tee-Object -FilePath $packageLog -Append

          Get-ChildItem -LiteralPath $packageRoot -Force |
            ForEach-Object {
              $kind = if ($_.PSIsContainer) { "[DIR] " } else { "[FILE]" }
              "$kind $($_.Name)" |
                Tee-Object -FilePath $packageLog -Append
            }

          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_path=$packageRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "primary_exe=$($primaryExe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host ""
          Write-Host "Standalone artifact folder prepared:"
          Write-Host "  $packageRoot"
          Write-Host "Primary EXE:"
          Write-Host "  $($primaryExe.FullName)"
          Write-Host ""
          Write-Host "No additional distribution ZIP is created."
          Write-Host "GitHub Artifact itself will be the single downloadable ZIP."

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs_${{ inputs.module }}_${{ github.run_number }}
          path: ${{ steps.init.outputs.log_root }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Standalone Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 6
          retention-days: 14
