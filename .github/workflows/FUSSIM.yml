
name: Build FUS Treatment Replay

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract ZIP files
        run: |
          Get-ChildItem -Path MODULE/FUSSIM -Filter *.zip | ForEach-Object {
            Expand-Archive -Path $_.FullName -DestinationPath MODULE/FUSSIM -Force
          }
        shell: pwsh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r MODULE/FUSSIM/requirements.txt
          python -m pip install nuitka ordered-set zstandard

      - name: Build EXE
        working-directory: MODULE/FUSSIM
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --enable-plugin=pyside6 ^
            --include-package=matplotlib ^
            --windows-console-mode=disable ^
            --output-filename=FUS_Treatment_Replay.exe ^
            fus_treatment_replay.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: FUS_Treatment_Replay
          path: MODULE/FUSSIM/FUS_Treatment_Replay.exe
