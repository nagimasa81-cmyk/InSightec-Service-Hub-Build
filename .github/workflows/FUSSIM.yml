
name: Build FUS Treatment Replay

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract ZIP files
        run: |
          Get-ChildItem -Path MODULE/FUSSIM -Filter *.zip -Recurse | ForEach-Object {
            Write-Host "Extracting $($_.FullName)"
            Expand-Archive -Path $_.FullName -DestinationPath $_.DirectoryName -Force
          }

      - name: Show files
        run: |
          Write-Host "Current Directory:"
          Get-Location
          Write-Host ""
          Write-Host "Searching fus_treatment_replay.py..."
          Get-ChildItem -Recurse -Filter fus_treatment_replay.py

      - name: Install dependencies
        working-directory: MODULE/FUSSIM
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build EXE with Nuitka
        working-directory: MODULE/FUSSIM
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --assume-yes-for-downloads ^
            --enable-plugin=pyside6 ^
            --include-package=matplotlib ^
            --windows-console-mode=disable ^
            --output-filename=FUS_Treatment_Replay.exe ^
            fus_treatment_replay.py

      - name: Verify output
        run: |
          Get-ChildItem -Recurse -Filter FUS_Treatment_Replay.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FUS_Treatment_Replay
          path: MODULE/FUSSIM/FUS_Treatment_Replay.exe
