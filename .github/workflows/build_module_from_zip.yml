name: Build Module From ZIP

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module folder name under modules/"
        required: true
        default: "Complaint_Service_Hub"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        shell: cmd
        run: |
          python -m pip install --upgrade pip

      - name: Extract source.zip
        shell: powershell
        run: |
          $module = "${{ github.event.inputs.module }}"
          $modulePath = "modules/$module"
          $zip = "$modulePath/source.zip"
          $work = "$modulePath/work"

          if (!(Test-Path $zip)) {
            Write-Error "source.zip not found: $zip"
            exit 1
          }

          if (Test-Path $work) {
            Remove-Item $work -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $work
          Expand-Archive -Path $zip -DestinationPath $work -Force

      - name: Install requirements
        shell: cmd
        run: |
          cd modules\${{ github.event.inputs.module }}\work

          if exist requirements.txt (
            pip install -r requirements.txt
          )

          pip install pyinstaller nuitka ordered-set zstandard

      - name: Run Build BAT
        shell: cmd
        run: |
          cd modules\${{ github.event.inputs.module }}\work

          if exist 01_BUILD_EXE_NUITKA.bat (
            call 01_BUILD_EXE_NUITKA.bat
          ) else if exist 01_BUILD_EXE_PYINSTALLER.bat (
            call 01_BUILD_EXE_PYINSTALLER.bat
          ) else (
            echo No build BAT found.
            dir
            exit /b 1
          )

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.module }}_build
          path: |
            modules/${{ github.event.inputs.module }}/work/dist/**
            modules/${{ github.event.inputs.module }}/work/*.zip
            modules/${{ github.event.inputs.module }}/work/release/**
            modules/${{ github.event.inputs.module }}/work/output/**
          if-no-files-found: ignore
