name: Build Selected Module

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module folder"
        required: true
        type: choice
        options:
          - Complaint_service_hub
          - InSightec_Service_hub
          - Log_explorer
          - Water_system_analyzer
      python_version:
        description: "Python version"
        required: true
        default: "3.13"
        type: choice
        options:
          - "3.13"
          - "3.14"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      NUITKA_ASSUME_YES_FOR_DOWNLOADS: "yes"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64
          cache: pip

      - name: Show Environment
        shell: pwsh
        run: |
          python --version
          python -m pip --version
          Write-Host "Selected module: ${{ inputs.module }}"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Extract Latest Source ZIP and Detect Build Method
        id: detect
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $modulePath = Join-Path $env:GITHUB_WORKSPACE "Module\$module"
          $work = Join-Path $modulePath "work"

          if (!(Test-Path $modulePath)) {
            throw "Module folder not found: $modulePath"
          }

          $zips = Get-ChildItem -Path $modulePath -Recurse -File -Filter *.zip |
            Where-Object {
              $_.FullName -notmatch '\\work\\' -and
              $_.FullName -notmatch '\\dist\\' -and
              $_.FullName -notmatch '\\build\\' -and
              $_.FullName -notmatch '\\release\\' -and
              $_.FullName -notmatch '\\output\\' -and
              $_.Name -notmatch '(?i)Program_Update|Master_Update|Plugin_Update|artifact|built|distribution'
            } |
            Sort-Object LastWriteTimeUtc -Descending

          if ($zips.Count -eq 0) {
            throw "No source ZIP file found under: $modulePath"
          }

          $latestZip = $zips[0]

          Write-Host "======================================"
          Write-Host "Module : $module"
          Write-Host "ZIP    : $($latestZip.FullName)"
          Write-Host "Python : ${{ inputs.python_version }}"
          Write-Host "======================================"

          if (Test-Path $work) {
            Remove-Item $work -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $work | Out-Null
          Expand-Archive -Path $latestZip.FullName -DestinationPath $work -Force

          $children = Get-ChildItem -Path $work -Force
          if ($children.Count -eq 1 -and $children[0].PSIsContainer) {
            $sourceRoot = $children[0].FullName
          }
          else {
            $sourceRoot = $work
          }

          Write-Host "Source root: $sourceRoot"

          Write-Host "Detected BAT files:"
          Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.bat |
            ForEach-Object { Write-Host " - $($_.FullName)" }

          $preferredBatNames = @(
            "01_BUILD_EXE_NUITKA.bat",
            "01_BUILD_EXE.bat",
            "BUILD_EXE_NUITKA.bat",
            "BUILD_EXE.bat"
          )

          $buildBat = $null

          foreach ($name in $preferredBatNames) {
            $buildBat = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter $name |
              Select-Object -First 1
            if ($buildBat) { break }
          }

          if (-not $buildBat) {
            $buildBat = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.bat |
              Where-Object {
                $_.Name -match '(?i)build.*exe|exe.*build' -or
                $_.Name -match '^01_'
              } |
              Sort-Object FullName |
              Select-Object -First 1
          }

          if ($buildBat) {
            Write-Host "======================================"
            Write-Host "Build Method : BAT"
            Write-Host "Build BAT    : $($buildBat.FullName)"
            Write-Host "Build Path   : $($buildBat.DirectoryName)"
            Write-Host "======================================"

            "method=bat" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($buildBat.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($buildBat.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($buildBat.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_zip=$($latestZip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $spec = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.spec |
            Sort-Object FullName |
            Select-Object -First 1

          if ($spec) {
            Write-Host "Build Method : PyInstaller spec"
            Write-Host "Spec         : $($spec.FullName)"

            "method=spec" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($spec.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($spec.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($spec.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_zip=$($latestZip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $main = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter main.py |
            Sort-Object FullName |
            Select-Object -First 1

          if ($main) {
            Write-Host "Build Method : Direct Nuitka"
            Write-Host "Entry point  : $($main.FullName)"

            "method=nuitka" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($main.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($main.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($main.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_zip=$($latestZip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          throw "No build BAT, .spec, or main.py was found."

      - name: Install Requirements
        shell: pwsh
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          $ErrorActionPreference = "Stop"

          $requirements = Get-ChildItem -Path . -File -Filter "requirements*.txt" |
            Sort-Object Name

          if ($requirements.Count -gt 0) {
            foreach ($req in $requirements) {
              Write-Host "Installing: $($req.FullName)"
              python -m pip install -r $req.FullName
            }
          }
          else {
            Write-Host "No requirements file found."
          }

          python -m pip install --upgrade `
            pyinstaller `
            nuitka `
            ordered-set `
            zstandard

      - name: Prepare Build BAT for GitHub Actions
        if: steps.detect.outputs.method == 'bat'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $batPath = "${{ steps.detect.outputs.build_file }}"
          $content = Get-Content -Path $batPath -Raw

          # GitHub Actions cannot respond to PAUSE.
          $content = $content -replace '(?im)^\s*pause\s*$', 'rem pause removed for GitHub Actions'

          # Automatically approve Nuitka dependency/tool downloads.
          if ($content -match '(?i)-m\s+nuitka' -and
              $content -notmatch '(?i)--assume-yes-for-downloads') {
            $content = $content -replace '(?i)(-m\s+nuitka\b)', '$1 --assume-yes-for-downloads'
          }

          if ($content -match '(?im)^\s*nuitka(\.exe)?\s+' -and
              $content -notmatch '(?i)--assume-yes-for-downloads') {
            $content = $content -replace '(?im)^(\s*nuitka(?:\.exe)?\s+)', '$1--assume-yes-for-downloads '
          }

          Set-Content -Path $batPath -Value $content -Encoding ASCII

          Write-Host "Prepared build BAT:"
          Get-Content -Path $batPath

      - name: Run Build BAT
        if: steps.detect.outputs.method == 'bat'
        shell: cmd
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          set NUITKA_ASSUME_YES_FOR_DOWNLOADS=yes
          echo Running ${{ steps.detect.outputs.build_name }}
          call "${{ steps.detect.outputs.build_file }}"

      - name: Build from PyInstaller Spec
        if: steps.detect.outputs.method == 'spec'
        shell: pwsh
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          python -m PyInstaller --noconfirm "${{ steps.detect.outputs.build_file }}"

      - name: Direct Nuitka Build
        if: steps.detect.outputs.method == 'nuitka'
        shell: pwsh
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=build `
            "${{ steps.detect.outputs.build_file }}"

      - name: Collect and Package Build Results
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $packageRoot = Join-Path $env:RUNNER_TEMP "distribution"

          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          $candidateDirs = @(
            (Join-Path $buildPath "dist"),
            (Join-Path $buildPath "release"),
            (Join-Path $buildPath "output"),
            (Join-Path $buildPath "build"),
            (Join-Path $buildPath "main.dist")
          )

          $copied = $false

          foreach ($candidate in $candidateDirs) {
            if (Test-Path $candidate) {
              $target = Join-Path $packageRoot (Split-Path $candidate -Leaf)
              Write-Host "Collecting directory: $candidate"
              Copy-Item -Path $candidate -Destination $target -Recurse -Force
              $copied = $true
            }
          }

          $exeFiles = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.exe |
            Where-Object {
              $_.FullName -notmatch '\\site-packages\\' -and
              $_.FullName -notmatch '\\.git\\'
            }

          foreach ($exe in $exeFiles) {
            $target = Join-Path $packageRoot $exe.Name
            if (!(Test-Path $target)) {
              Write-Host "Collecting EXE: $($exe.FullName)"
              Copy-Item -Path $exe.FullName -Destination $target -Force
            }
            $copied = $true
          }

          $generatedZips = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.zip |
            Where-Object {
              $_.FullName -notmatch '\\work\\' -and
              $_.FullName -ne "${{ steps.detect.outputs.source_zip }}"
            }

          foreach ($zip in $generatedZips) {
            $target = Join-Path $packageRoot $zip.Name
            if (!(Test-Path $target)) {
              Copy-Item -Path $zip.FullName -Destination $target -Force
            }
            $copied = $true
          }

          if (-not $copied) {
            throw "Build completed, but no EXE, ZIP, or output directory was found."
          }

          $safeModule = $module -replace '[^A-Za-z0-9_.-]', '_'
          $pythonTag = "${{ inputs.python_version }}".Replace(".", "")
          $artifactName = "${safeModule}_Python${pythonTag}_build"
          $zipPath = Join-Path $env:RUNNER_TEMP "$artifactName.zip"

          Compress-Archive `
            -Path (Join-Path $packageRoot "*") `
            -DestinationPath $zipPath `
            -Force

          Write-Host "Distribution ZIP: $zipPath"

          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
