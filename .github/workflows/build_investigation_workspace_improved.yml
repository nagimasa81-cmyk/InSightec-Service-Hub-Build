name: Build Selected Module

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module folder"
        required: true
        type: choice
        options:
          - Complaint_service_hub
          - InSightec_Service_hub
          - Log_explorer
          - Water_system_analyzer
          - WS_Investigation
          - HUB

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      NUITKA_ASSUME_YES_FOR_DOWNLOADS: "yes"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Python 3.13 is preferred for current Nuitka stability.
      # If setup itself is unavailable, fall back to 3.14.
      - name: Setup Python 3.13
        id: setup_python_313
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64
          
             python -m pip install -r requirements-build.txt
 
      - name: Fallback to Python 3.14
        if: steps.setup_python_313.outcome != 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64

      - name: Show Environment
        shell: pwsh
        run: |
          python --version
          python -m pip --version
          Write-Host "Selected module: ${{ inputs.module }}"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Extract Latest Source ZIP and Detect Build Method
        id: detect
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $modulePath = Join-Path $env:GITHUB_WORKSPACE "Module\$module"
          $work = Join-Path $modulePath "work"

          if (!(Test-Path $modulePath)) {
            throw "Module folder not found: $modulePath"
          }

          # Select the latest source ZIP only.
          $zips = Get-ChildItem -Path $modulePath -Recurse -File -Filter *.zip |
            Where-Object {
              $_.FullName -notmatch '\\work\\' -and
              $_.FullName -notmatch '\\dist\\' -and
              $_.FullName -notmatch '\\build\\' -and
              $_.FullName -notmatch '\\release\\' -and
              $_.FullName -notmatch '\\output\\' -and
              $_.Name -notmatch '(?i)Program_Update|Master_Update|Plugin_Update|artifact|built|distribution'
            } |
            Sort-Object LastWriteTimeUtc -Descending

          if ($zips.Count -eq 0) {
            throw "No source ZIP file found under: $modulePath"
          }

          $latestZip = $zips[0]

          Write-Host "======================================"
          Write-Host "Module : $module"
          Write-Host "ZIP    : $($latestZip.FullName)"
          Write-Host "======================================"

          if (Test-Path $work) {
            Remove-Item $work -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $work | Out-Null
          Expand-Archive -Path $latestZip.FullName -DestinationPath $work -Force

          $children = Get-ChildItem -Path $work -Force
          if ($children.Count -eq 1 -and $children[0].PSIsContainer) {
            $sourceRoot = $children[0].FullName
          } else {
            $sourceRoot = $work
          }

          Write-Host "Source root: $sourceRoot"

          $preferredBatNames = @(
            "01_BUILD_EXE_NUITKA.bat",
            "01_BUILD_EXE.bat",
            "BUILD_EXE_NUITKA.bat",
            "BUILD_EXE.bat"
          )

          $buildBat = $null

          foreach ($name in $preferredBatNames) {
            $buildBat = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter $name |
              Select-Object -First 1
            if ($buildBat) { break }
          }

          if (-not $buildBat) {
            $buildBat = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.bat |
              Where-Object {
                $_.Name -match '(?i)build.*exe|exe.*build' -or
                $_.Name -match '^01_'
              } |
              Sort-Object FullName |
              Select-Object -First 1
          }

          if ($buildBat) {
            Write-Host "Build Method : BAT"
            Write-Host "Build BAT    : $($buildBat.FullName)"

            "method=bat" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($buildBat.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($buildBat.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($buildBat.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $spec = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter *.spec |
            Sort-Object FullName |
            Select-Object -First 1

          if ($spec) {
            Write-Host "Build Method : PyInstaller spec"
            Write-Host "Spec         : $($spec.FullName)"

            "method=spec" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($spec.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($spec.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($spec.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $main = Get-ChildItem -Path $sourceRoot -Recurse -File -Filter main.py |
            Sort-Object FullName |
            Select-Object -First 1

          if ($main) {
            Write-Host "Build Method : Direct Nuitka"
            Write-Host "Entry point  : $($main.FullName)"

            "method=nuitka" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_file=$($main.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_name=$($main.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "build_path=$($main.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "source_root=$sourceRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          throw "No build BAT, .spec, or main.py was found."

      - name: Install Requirements
        shell: pwsh
        run: |
         $ErrorActionPreference = "Stop"
         python -m pip install --upgrade pip
         python -m pip install `
           PySide6 `
           Nuitka `
           ordered-set `
           zstandard `
           pywin32 `
           pyinstaller
         Write-Host ""
         Write-Host "Python:"
         python --version
         python -c "import sys; print(sys.executable)"
         Write-Host ""
         Write-Host "PySide6:"
         python -c "import PySide6; print(PySide6.__version__); print(PySide6.__file__)"
         Write-Host ""
         Write-Host "Nuitka:"
         python -m nuitka --version

      - name: Prepare Build BAT for GitHub Actions
        if: steps.detect.outputs.method == 'bat'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $batPath = "${{ steps.detect.outputs.build_file }}"
          $content = Get-Content -Path $batPath -Raw

          # Avoid py launcher selecting a different pre-installed Python version.
          $content = $content -replace '(?im)^\s*set\s+PYEXE=.*$', 'set PYEXE=python'
          $content = $content -replace '(?im)^\s*if\s+errorlevel\s+1\s+set\s+PYEXE=.*$', 'rem Python fallback is controlled by GitHub Actions'

          # GitHub Actions cannot answer PAUSE prompts.
          $content = $content -replace '(?im)^\s*pause\s*$', 'rem pause removed for GitHub Actions'

          # Automatically approve Nuitka tool downloads.
          if ($content -match '(?i)-m\s+nuitka' -and
              $content -notmatch '(?i)--assume-yes-for-downloads') {
            $content = $content -replace '(?i)(-m\s+nuitka\b)', '$1 --assume-yes-for-downloads'
          }

          # Put Nuitka results in a predictable output folder.
          if ($content -match '(?i)-m\s+nuitka' -and
              $content -notmatch '(?i)--output-dir(?:=|\s)') {
            $content = $content -replace '(?i)(--mode=standalone\s+\^)', "--mode=standalone ^`r`n  --output-dir=build ^"
          }

          Set-Content -Path $batPath -Value $content -Encoding ASCII

          Write-Host "Prepared BAT:"
          Get-Content -Path $batPath
          
      - name: Add Nuitka Non-Interactive Option
        shell: pwsh
        run: |
         $batFile = "${{ steps.detect.outputs.build_file }}"
         Write-Host "Patching BAT: $batFile"
         if (-not (Test-Path $batFile)) {
           throw "Build BAT not found: $batFile"
         }
         $content = Get-Content -Path $batFile -Raw
         if ($content -notmatch "--assume-yes-for-downloads") {
           $content = $content.Replace(
             "python -m nuitka",
             "python -m nuitka --assume-yes-for-downloads"
           )
           $content = $content.Replace(
             "python.exe -m nuitka",
             "python.exe -m nuitka --assume-yes-for-downloads"
           )
           Set-Content -Path $batFile -Value $content -Encoding UTF8
         }
         Write-Host "Patched BAT content:"
         Get-Content -Path $batFile
      - name: Run Build BAT
        if: steps.detect.outputs.method == 'bat'
        shell: cmd
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          set NUITKA_ASSUME_YES_FOR_DOWNLOADS=yes
          echo Running ${{ steps.detect.outputs.build_name }}
          call "${{ steps.detect.outputs.build_file }}"
          
      - name: Print Build Logs
        if: always()
        shell: pwsh
        run: |
           $buildPath = "${{ steps.detect.outputs.build_path }}"
           $logRoot = Join-Path $buildPath "build_logs"

           Write-Host "Build path: $buildPath"
           Write-Host "Log path:   $logRoot"

           if (-not (Test-Path $logRoot)) {
             Write-Warning "build_logs directory was not found."
           exit 0
           }

           $logs = Get-ChildItem `
            -Path $logRoot `
            -Recurse `
            -File `
            -Filter "*.log" |
            Sort-Object LastWriteTime

           if ($logs.Count -eq 0) {
            Write-Warning "No build log was found."
            exit 0
           }

           foreach ($log in $logs) {
            Write-Host ""
            Write-Host "=================================================="
            Write-Host "BUILD LOG: $($log.FullName)"
            Write-Host "=================================================="

            Get-Content -Path $log.FullName -Tail 200
            }

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ServiceHub-Build-Logs
          path: |
            ${{ steps.detect.outputs.build_path }}/build_logs
          if-no-files-found: warn
          retention-days: 14


      
      - name: Build from PyInstaller Spec
        if: steps.detect.outputs.method == 'spec'
        shell: pwsh
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          python -m PyInstaller --noconfirm "${{ steps.detect.outputs.build_file }}"

      - name: Direct Nuitka Build
        if: steps.detect.outputs.method == 'nuitka'
        shell: pwsh
        working-directory: ${{ steps.detect.outputs.build_path }}
        run: |
          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=build
            --assume-yes-for-downloads`
            "${{ steps.detect.outputs.build_file }}"

      - name: Validate and Package Standalone Build
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ inputs.module }}"
          $sourceRoot = "${{ steps.detect.outputs.source_root }}"
          $buildPath = "${{ steps.detect.outputs.build_path }}"
          $packageRoot = Join-Path $env:RUNNER_TEMP "distribution"

          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          # Nuitka standalone output: *.dist directories.
          $distDirs = Get-ChildItem -Path $sourceRoot -Recurse -Directory |
            Where-Object { $_.Name -like "*.dist" }

          # PyInstaller output may be a normal dist directory.
          $pyInstallerDirs = Get-ChildItem -Path $sourceRoot -Recurse -Directory |
            Where-Object {
              $_.Name -eq "dist" -and
              $_.FullName -notmatch '\\site-packages\\'
            }

          $standaloneFound = $false

          foreach ($dist in $distDirs) {
            $exe = Get-ChildItem -Path $dist.FullName -File -Filter *.exe |
              Select-Object -First 1

            if (-not $exe) {
              Write-Warning "Skipping .dist without EXE: $($dist.FullName)"
              continue
            }

            $pythonDll = Get-ChildItem -Path $dist.FullName -Recurse -File |
              Where-Object { $_.Name -match '^python3\d+\.dll$' } |
              Select-Object -First 1

            if (-not $pythonDll) {
              throw "Standalone validation failed: Python DLL is missing from $($dist.FullName)"
            }

            $targetName = $dist.Name
            $target = Join-Path $packageRoot $targetName

            Write-Host "Collecting standalone folder: $($dist.FullName)"
            Write-Host "EXE        : $($exe.Name)"
            Write-Host "Python DLL : $($pythonDll.Name)"

            Copy-Item -Path $dist.FullName -Destination $target -Recurse -Force
            $standaloneFound = $true
          }

          foreach ($dist in $pyInstallerDirs) {
            $exeFiles = Get-ChildItem -Path $dist.FullName -Recurse -File -Filter *.exe
            if ($exeFiles.Count -eq 0) {
              continue
            }

            $target = Join-Path $packageRoot "dist"
            Copy-Item -Path $dist.FullName -Destination $target -Recurse -Force
            $standaloneFound = $true
          }

          if (-not $standaloneFound) {
            Write-Host "Detected directories under source root:"
            Get-ChildItem -Path $sourceRoot -Recurse -Directory |
              Select-Object -ExpandProperty FullName

            throw "No valid standalone .dist or PyInstaller dist directory was found. Loose EXE files are intentionally not packaged."
          }

          $safeModule = $module -replace '[^A-Za-z0-9_.-]', '_'
          $pythonVersion = (python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')").Trim()
          $artifactName = "${safeModule}_Python${pythonVersion}_Standalone"
          $zipPath = Join-Path $env:RUNNER_TEMP "$artifactName.zip"

          Compress-Archive `
            -Path (Join-Path $packageRoot "*") `
            -DestinationPath $zipPath `
            -Force

          Write-Host "======================================"
          Write-Host "Standalone distribution created"
          Write-Host "ZIP: $zipPath"
          Write-Host "Run the EXE inside its .dist folder."
          Write-Host "======================================"

          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "artifact_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Standalone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
