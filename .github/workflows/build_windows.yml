name: Build MRI Raw FFT Explorer

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: Build engine
        required: true
        default: fast_pyinstaller
        type: choice
        options:
          - fast_pyinstaller
          - nuitka_standalone

env:
  APP_NAME: MRI_Raw_FFT_Explorer
  APP_VERSION: "0.8.3"
  APP_COMMIT: "Commit0008_R4"
  PYTHON_VERSION: "3.13"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Build
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.build_engine }}" -eq "fast_pyinstaller") {
            .\02_BUILD_FAST_STANDALONE.bat
          } else {
            .\03_BUILD_NUITKA_STANDALONE.bat
          }

      - name: Create BUILD_INFO
        shell: pwsh
        run: |
          @"
Application=${{ env.APP_NAME }}
Version=${{ env.APP_VERSION }}
Commit=${{ env.APP_COMMIT }}
Engine=${{ github.event.inputs.build_engine }}
GitSHA=${{ github.sha }}
BuildDateUTC=$([DateTime]::UtcNow.ToString("yyyy-MM-dd HH:mm:ss"))
"@ | Set-Content dist\BUILD_INFO.txt -Encoding UTF8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.APP_VERSION }}_${{ env.APP_COMMIT }}_${{ github.event.inputs.build_engine }}
          path: |
            dist/**
          compression-level: 6
          retention-days: 14
