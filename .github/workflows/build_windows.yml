name: Build MRI Raw FFT Explorer

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: "Build engine"
        required: true
        default: "fast_pyinstaller"
        type: choice
        options:
          - fast_pyinstaller
          - nuitka_standalone
  push:
    paths:
      - "**/MRI_Raw_FFT_Explorer*.zip"
      - "**/app.py"
      - "**/requirements*.txt"
      - "**/vendor_adapters.py"
      - "**/vendor_sdk_config.json"
      - ".github/workflows/build_windows.yml"

concurrency:
  group: mri-raw-fft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Locate or extract MRI source
        id: source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $workspace = (Get-Location).Path
          $buildRoot = Join-Path $workspace "_mri_build_source"
          New-Item -ItemType Directory -Force -Path $buildRoot | Out-Null

          # Prefer an already-extracted source containing both app.py and requirements.txt.
          $apps = Get-ChildItem -Path $workspace -Filter app.py -File -Recurse |
            Where-Object { $_.FullName -notlike "*$([IO.Path]::DirectorySeparatorChar)_mri_build_source$([IO.Path]::DirectorySeparatorChar)*" }

          $sourceDir = $null
          foreach ($app in $apps) {
            if (Test-Path (Join-Path $app.DirectoryName "requirements.txt")) {
              $sourceDir = $app.DirectoryName
              break
            }
          }

          # Otherwise find the newest matching source ZIP anywhere in the repository.
          if (-not $sourceDir) {
            $zip = Get-ChildItem -Path $workspace -File -Recurse -Filter "MRI_Raw_FFT_Explorer*_SOURCE.zip" |
              Sort-Object LastWriteTimeUtc, Name -Descending |
              Select-Object -First 1

            if (-not $zip) {
              $zip = Get-ChildItem -Path $workspace -File -Recurse -Filter "*.zip" |
                Where-Object { $_.Name -match "MRI.*Raw.*FFT|MRI.*Reconstruction" } |
                Sort-Object LastWriteTimeUtc, Name -Descending |
                Select-Object -First 1
            }

            if (-not $zip) {
              throw "No extracted MRI source and no matching Source ZIP were found in the repository."
            }

            Write-Host "Extracting source ZIP: $($zip.FullName)"
            Expand-Archive -LiteralPath $zip.FullName -DestinationPath $buildRoot -Force

            $app = Get-ChildItem -Path $buildRoot -Filter app.py -File -Recurse |
              Where-Object { Test-Path (Join-Path $_.DirectoryName "requirements.txt") } |
              Select-Object -First 1
            if (-not $app) {
              throw "The selected ZIP does not contain app.py and requirements.txt in the same source folder."
            }
            $sourceDir = $app.DirectoryName
          }

          Write-Host "Using source directory: $sourceDir"
          "source_dir=$sourceDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $required = @("app.py", "requirements.txt", "vendor_adapters.py", "vendor_sdk_config.json")
          foreach ($name in $required) {
            if (-not (Test-Path (Join-Path $sourceDir $name))) {
              throw "Required source file missing: $name"
            }
          }

      - name: Install application dependencies
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install fast build dependencies
        if: ${{ inputs.build_engine != 'nuitka_standalone' }}
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: python -m pip install -r requirements-build-fast.txt

      - name: Install Nuitka build dependencies
        if: ${{ inputs.build_engine == 'nuitka_standalone' }}
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: python -m pip install -r requirements-build-nuitka.txt

      - name: Build fast standalone folder
        if: ${{ inputs.build_engine != 'nuitka_standalone' }}
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name MRI_Raw_FFT_Explorer `
            --distpath dist `
            --workpath build `
            --specpath build `
            --add-data "vendor_sdk_config.json;." `
            --collect-all pyqtgraph `
            --collect-all pydicom `
            --collect-all pylibjpeg `
            --collect-all pylibjpeg_libjpeg `
            --collect-all openjpeg `
            --hidden-import vendor_adapters `
            app.py
          if (!(Test-Path "dist\MRI_Raw_FFT_Explorer\MRI_Raw_FFT_Explorer.exe")) { throw "EXE was not created." }

      - name: Build Nuitka standalone folder
        if: ${{ inputs.build_engine == 'nuitka_standalone' }}
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --jobs=4 `
            --output-dir=dist_nuitka `
            --output-filename=MRI_Raw_FFT_Explorer.exe `
            --include-module=vendor_adapters `
            --include-data-file=vendor_sdk_config.json=vendor_sdk_config.json `
            app.py
          if (!(Test-Path "dist_nuitka\app.dist\MRI_Raw_FFT_Explorer.exe")) { throw "EXE was not created." }

      - name: Create one-level distribution package
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $package = "MRI_Raw_FFT_Explorer_Windows"
          Remove-Item $package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          if ("${{ inputs.build_engine }}" -eq "nuitka_standalone") {
            Copy-Item "dist_nuitka\app.dist\*" $package -Recurse -Force
          } else {
            Copy-Item "dist\MRI_Raw_FFT_Explorer\*" $package -Recurse -Force
          }

          Copy-Item "README.md" "$package\README.md" -Force
          Copy-Item "vendor_sdk_config.json" "$package\vendor_sdk_config.json" -Force
          Set-Content -Path "$package\BUILD_INFO.txt" -Encoding UTF8 -Value @(
            "Commit=$env:GITHUB_SHA",
            "Engine=${{ inputs.build_engine }}",
            "Python=3.13",
            "BuildDateUTC=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          )
          Compress-Archive -Path "$package\*" -DestinationPath "MRI_Raw_FFT_Explorer_Windows.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: MRI_Raw_FFT_Explorer_Windows-${{ inputs.build_engine || 'fast_pyinstaller' }}
          path: ${{ steps.source.outputs.source_dir }}/MRI_Raw_FFT_Explorer_Windows.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
