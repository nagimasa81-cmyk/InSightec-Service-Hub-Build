name: Build Module from Version Metadata

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: Build engine
        required: true
        default: fast_pyinstaller
        type: choice
        options:
          - fast_pyinstaller
          - nuitka_standalone
  push:
    paths:
      - "Module/**"
      - "*.zip"
      - ".github/workflows/build_module_generic.yml"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      BUILD_ENGINE: ${{ github.event.inputs.build_engine || 'fast_pyinstaller' }}
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest source package
        id: source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:GITHUB_WORKSPACE

          $zips = Get-ChildItem -Path $root -Recurse -File -Filter "*_SOURCE.zip" |
            Sort-Object LastWriteTimeUtc -Descending

          $sourceDir = $null
          if ($zips.Count -gt 0) {
            $zip = $zips[0]
            $sourceDir = Join-Path $env:RUNNER_TEMP "resolved_source"
            Remove-Item $sourceDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $sourceDir | Out-Null
            Expand-Archive -LiteralPath $zip.FullName -DestinationPath $sourceDir -Force
            Write-Host "Selected source ZIP: $($zip.FullName)"
          } else {
            $versionFiles = Get-ChildItem -Path $root -Recurse -File -Filter "version.json"
            foreach ($candidate in $versionFiles) {
              $folder = $candidate.Directory.FullName
              if ((Test-Path (Join-Path $folder "app.py")) -and
                  (Test-Path (Join-Path $folder "requirements.txt"))) {
                $sourceDir = $folder
                break
              }
            }
          }

          if (-not $sourceDir) {
            throw "No valid source package or extracted source folder was found."
          }

          $versionPath = Join-Path $sourceDir "version.json"
          if (-not (Test-Path $versionPath)) {
            throw "version.json is required so this workflow never needs version edits."
          }

          $meta = Get-Content $versionPath -Raw | ConvertFrom-Json
          $entryPoint = Join-Path $sourceDir $meta.entry_point
          $requirements = Join-Path $sourceDir "requirements.txt"
          if (-not (Test-Path $entryPoint)) { throw "Entry point not found: $entryPoint" }
          if (-not (Test-Path $requirements)) { throw "requirements.txt not found." }

          "source_dir=$sourceDir" >> $env:GITHUB_OUTPUT
          "app_name=$($meta.app_name)" >> $env:GITHUB_OUTPUT
          "app_version=$($meta.version)" >> $env:GITHUB_OUTPUT
          "app_commit=$($meta.commit)" >> $env:GITHUB_OUTPUT
          "entry_point=$($meta.entry_point)" >> $env:GITHUB_OUTPUT
          "exe_name=$($meta.exe_name)" >> $env:GITHUB_OUTPUT
          "artifact_prefix=$($meta.artifact_prefix)" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ("${{ env.BUILD_ENGINE }}" -eq "nuitka_standalone") {
            python -m pip install nuitka ordered-set zstandard
          } else {
            python -m pip install pyinstaller
          }

      - name: Validate source imports
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m py_compile "${{ steps.source.outputs.entry_point }}"
          python -c "import app; print('Application import validated')"

      - name: Build fast standalone
        if: env.BUILD_ENGINE != 'nuitka_standalone'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $sourceDir = (Get-Location).Path
          $entry = Join-Path $sourceDir "${{ steps.source.outputs.entry_point }}"
          $config = Join-Path $sourceDir "vendor_sdk_config.json"

          $args = @(
            "--noconfirm",
            "--clean",
            "--windowed",
            "--onedir",
            "--name", "${{ steps.source.outputs.app_name }}",
            "--distpath", "dist",
            "--workpath", "build",
            "--paths", $sourceDir,
            "--collect-all", "pydicom",
            "--hidden-import", "pylibjpeg",
            "--hidden-import", "libjpeg",
            "--hidden-import", "openjpeg",
            $entry
          )

          if (Test-Path $config) {
            $args = @("--add-data", "$config;.") + $args
          }

          Get-ChildItem -Path $sourceDir -File -Filter "*.json" |
            ForEach-Object {
              $args = @("--add-data", "$($_.FullName);.") + $args
            }

          python -m PyInstaller @args

      - name: Build Nuitka standalone
        if: env.BUILD_ENGINE == 'nuitka_standalone'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=dist_nuitka `
            --output-filename="${{ steps.source.outputs.exe_name }}" `
            "${{ steps.source.outputs.entry_point }}"

      - name: Stage single-layer Artifact
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $package = "artifact_payload"
          Remove-Item $package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          if ("${{ env.BUILD_ENGINE }}" -eq "nuitka_standalone") {
            $distFolder = Get-ChildItem "dist_nuitka" -Directory |
              Where-Object { $_.Name -like "*.dist" } |
              Select-Object -First 1
            if (-not $distFolder) { throw "Nuitka dist folder not found." }
            Copy-Item "$($distFolder.FullName)\*" $package -Recurse -Force
          } else {
            $distFolder = Join-Path "dist" "${{ steps.source.outputs.app_name }}"
            if (-not (Test-Path $distFolder)) { throw "PyInstaller dist folder not found." }
            Copy-Item "$distFolder\*" $package -Recurse -Force
          }

          if (Test-Path "README.md") { Copy-Item "README.md" "$package\README.md" -Force }
          if (Test-Path "version.json") { Copy-Item "version.json" "$package\version.json" -Force }

          Set-Content -Path "$package\BUILD_INFO.txt" -Encoding UTF8 -Value @(
            "Application=${{ steps.source.outputs.app_name }}",
            "Version=${{ steps.source.outputs.app_version }}",
            "Release=${{ steps.source.outputs.app_commit }}",
            "GitSHA=$env:GITHUB_SHA",
            "Engine=${{ env.BUILD_ENGINE }}",
            "Python=3.13",
            "BuildDateUTC=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          )

      - name: Upload versioned Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.source.outputs.artifact_prefix }}_v${{ steps.source.outputs.app_version }}_${{ steps.source.outputs.app_commit }}_${{ env.BUILD_ENGINE }}
          path: ${{ steps.source.outputs.source_dir }}/artifact_payload/*
          include-hidden-files: true
          if-no-files-found: error
          compression-level: 6
          retention-days: 14
