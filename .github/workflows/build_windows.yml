name: Build MRI Raw FFT Explorer

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: "Build engine"
        required: true
        default: "fast_pyinstaller"
        type: choice
        options:
          - fast_pyinstaller
          - nuitka_standalone
  push:
    paths:
      - "app.py"
      - "vendor_adapters.py"
      - "vendor_sdk_config.json"
      - "requirements*.txt"
      - ".github/workflows/build_windows.yml"

concurrency:
  group: mri-raw-fft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build-fast.txt
            requirements-build-nuitka.txt

      - name: Cache Nuitka compilation data
        if: ${{ inputs.build_engine == 'nuitka_standalone' }}
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka\Cache
            ~\AppData\Local\ccache
          key: nuitka-win-py313-${{ hashFiles('requirements-build-nuitka.txt', 'app.py', 'vendor_adapters.py') }}
          restore-keys: |
            nuitka-win-py313-

      - name: Install fast build dependencies
        if: ${{ inputs.build_engine != 'nuitka_standalone' }}
        shell: pwsh
        run: python -m pip install -r requirements-build-fast.txt

      - name: Install Nuitka build dependencies
        if: ${{ inputs.build_engine == 'nuitka_standalone' }}
        shell: pwsh
        run: python -m pip install -r requirements-build-nuitka.txt

      - name: Build fast standalone folder
        if: ${{ inputs.build_engine != 'nuitka_standalone' }}
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name MRI_Raw_FFT_Explorer `
            --distpath dist `
            --workpath build `
            --specpath build `
            --add-data "vendor_sdk_config.json;." `
            --collect-all pyqtgraph `
            --collect-all pydicom `
            --collect-all pylibjpeg `
            --collect-all pylibjpeg_libjpeg `
            --collect-all openjpeg `
            --hidden-import vendor_adapters `
            app.py
          if (!(Test-Path "dist\MRI_Raw_FFT_Explorer\MRI_Raw_FFT_Explorer.exe")) { throw "EXE was not created." }

      - name: Build Nuitka standalone folder
        if: ${{ inputs.build_engine == 'nuitka_standalone' }}
        shell: pwsh
        run: |
          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --jobs=4 `
            --output-dir=dist_nuitka `
            --output-filename=MRI_Raw_FFT_Explorer.exe `
            --include-module=vendor_adapters `
            --include-data-file=vendor_sdk_config.json=vendor_sdk_config.json `
            app.py
          if (!(Test-Path "dist_nuitka\app.dist\MRI_Raw_FFT_Explorer.exe")) { throw "EXE was not created." }

      - name: Create one-level distribution package
        shell: pwsh
        run: |
          $package = "MRI_Raw_FFT_Explorer_Windows"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          if ("${{ inputs.build_engine }}" -eq "nuitka_standalone") {
            Copy-Item "dist_nuitka\app.dist\*" $package -Recurse -Force
          } else {
            Copy-Item "dist\MRI_Raw_FFT_Explorer\*" $package -Recurse -Force
          }
          Copy-Item "README.md" "$package\README.md" -Force
          Copy-Item "vendor_sdk_config.json" "$package\vendor_sdk_config.json" -Force
          Set-Content -Path "$package\BUILD_INFO.txt" -Encoding UTF8 -Value @(
            "Commit=$env:GITHUB_SHA",
            "Engine=${{ inputs.build_engine }}",
            "Python=3.13",
            "BuildDateUTC=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          )
          Compress-Archive -Path "$package\*" -DestinationPath "MRI_Raw_FFT_Explorer_Windows.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: MRI_Raw_FFT_Explorer_Windows-${{ inputs.build_engine || 'fast_pyinstaller' }}
          path: MRI_Raw_FFT_Explorer_Windows.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
