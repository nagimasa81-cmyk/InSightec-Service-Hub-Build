name: Universal Module Build v2

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: Build engine
        required: true
        default: auto
        type: choice
        options:
          - auto
          - fast_pyinstaller
          - nuitka_standalone
  push:
    paths:
      - "Module/**"
      - "**/*_SOURCE.zip"
      - ".github/workflows/build_module_universal_v2.yml"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve source and metadata
        id: source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:GITHUB_WORKSPACE

          # Prefer the newest SOURCE ZIP. Fall back to an extracted source folder.
          $zip = Get-ChildItem -Path $root -Recurse -File -Filter "*_SOURCE.zip" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          $sourceDir = $null
          $sourceZipName = ""

          if ($zip) {
            $sourceZipName = $zip.BaseName
            $sourceDir = Join-Path $env:RUNNER_TEMP "resolved_source"
            Remove-Item $sourceDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $sourceDir | Out-Null
            Expand-Archive -LiteralPath $zip.FullName -DestinationPath $sourceDir -Force
            Write-Host "Selected SOURCE ZIP: $($zip.FullName)"
          } else {
            $candidates = Get-ChildItem -Path $root -Recurse -File |
              Where-Object { $_.Name -in @("version.json", "app.py", "main.py") }

            foreach ($candidate in $candidates) {
              $folder = $candidate.Directory.FullName
              if ((Test-Path (Join-Path $folder "requirements.txt")) -and
                  ((Test-Path (Join-Path $folder "app.py")) -or
                   (Test-Path (Join-Path $folder "main.py")))) {
                $sourceDir = $folder
                break
              }
            }
          }

          if (-not $sourceDir) {
            throw "No valid SOURCE ZIP or extracted source folder was found."
          }

          $versionPath = Join-Path $sourceDir "version.json"
          $meta = $null

          if (Test-Path $versionPath) {
            try {
              $meta = Get-Content $versionPath -Raw | ConvertFrom-Json
              Write-Host "Using version.json metadata."
            } catch {
              Write-Warning "version.json could not be parsed. Falling back to filename metadata."
              $meta = $null
            }
          }

          # Backward-compatible defaults.
          $folderName = Split-Path $sourceDir -Leaf
          $baseName = if ($sourceZipName) { $sourceZipName } else { $folderName }
          $baseName = $baseName -replace "_SOURCE$", ""

          $fallbackApp = $baseName
          $fallbackVersion = "Unknown"
          $fallbackCommit = "Unknown"

          # Parse common legacy names such as:
          # WaterSystemAnalyzer_Ver73g_DropFirstUI_SOURCE.zip
          # MRI_Raw_FFT_Explorer_Commit0010_R1_SOURCE.zip
          if ($baseName -match "^(?<app>.+?)_(?<version>v?\d+(?:\.\d+){1,3}|Ver[^_]+)_(?<commit>.+)$") {
            $fallbackApp = $Matches["app"]
            $fallbackVersion = $Matches["version"]
            $fallbackCommit = $Matches["commit"]
          } elseif ($baseName -match "^(?<app>.+?)_(?<commit>Commit\d+(?:_[A-Za-z0-9.-]+)*)$") {
            $fallbackApp = $Matches["app"]
            $fallbackCommit = $Matches["commit"]
          }

          function First-NonEmpty {
            param([object]$Value, [string]$Fallback)
            if ($null -eq $Value) { return $Fallback }
            $text = [string]$Value
            if ([string]::IsNullOrWhiteSpace($text)) { return $Fallback }
            return $text
          }

          $appName = First-NonEmpty $meta.app_name $fallbackApp
          $appVersion = First-NonEmpty $meta.version $fallbackVersion
          $appCommit = First-NonEmpty $meta.commit $fallbackCommit
          $entryPoint = First-NonEmpty $meta.entry_point ""

          if ([string]::IsNullOrWhiteSpace($entryPoint)) {
            if (Test-Path (Join-Path $sourceDir "app.py")) {
              $entryPoint = "app.py"
            } elseif (Test-Path (Join-Path $sourceDir "main.py")) {
              $entryPoint = "main.py"
            } else {
              $pythonEntry = Get-ChildItem -Path $sourceDir -File -Filter "*.py" |
                Where-Object { $_.Name -notmatch "^(setup|version|vendor_)" } |
                Select-Object -First 1
              if (-not $pythonEntry) { throw "No Python entry point was found." }
              $entryPoint = $pythonEntry.Name
            }
          }

          $artifactPrefix = First-NonEmpty $meta.artifact_prefix $appName
          $exeName = First-NonEmpty $meta.exe_name "$appName.exe"
          $preferredEngine = First-NonEmpty $meta.build_engine "fast_pyinstaller"
          $requestedEngine = "${{ github.event.inputs.build_engine }}"

          if ([string]::IsNullOrWhiteSpace($requestedEngine) -or $requestedEngine -eq "auto") {
            $buildEngine = $preferredEngine
          } else {
            $buildEngine = $requestedEngine
          }

          if ($buildEngine -notin @("fast_pyinstaller", "nuitka_standalone")) {
            Write-Warning "Unsupported build engine '$buildEngine'; using fast_pyinstaller."
            $buildEngine = "fast_pyinstaller"
          }

          $requirements = Join-Path $sourceDir "requirements.txt"
          if (-not (Test-Path $requirements)) {
            Write-Warning "requirements.txt was missing. Creating an empty file."
            New-Item -ItemType File -Force -Path $requirements | Out-Null
          }

          $entryPath = Join-Path $sourceDir $entryPoint
          if (-not (Test-Path $entryPath)) {
            throw "Entry point not found: $entryPath"
          }

          Write-Host "Resolved application : $appName"
          Write-Host "Resolved version     : $appVersion"
          Write-Host "Resolved commit      : $appCommit"
          Write-Host "Resolved entry point : $entryPoint"
          Write-Host "Resolved engine      : $buildEngine"

          "source_dir=$sourceDir" >> $env:GITHUB_OUTPUT
          "app_name=$appName" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "app_commit=$appCommit" >> $env:GITHUB_OUTPUT
          "entry_point=$entryPoint" >> $env:GITHUB_OUTPUT
          "exe_name=$exeName" >> $env:GITHUB_OUTPUT
          "artifact_prefix=$artifactPrefix" >> $env:GITHUB_OUTPUT
          "build_engine=$buildEngine" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

          if ("${{ steps.source.outputs.build_engine }}" -eq "nuitka_standalone") {
            python -m pip install nuitka ordered-set zstandard
          } else {
            python -m pip install pyinstaller
          }

      - name: Validate source
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m py_compile "${{ steps.source.outputs.entry_point }}"
          python -c "import importlib.util, pathlib; p=pathlib.Path(r'${{ steps.source.outputs.entry_point }}'); s=importlib.util.spec_from_file_location('build_entry', p); m=importlib.util.module_from_spec(s); s.loader.exec_module(m); print('Entry import validated')"

      - name: Build PyInstaller standalone
        if: steps.source.outputs.build_engine == 'fast_pyinstaller'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $sourceDir = (Get-Location).Path
          $entry = Join-Path $sourceDir "${{ steps.source.outputs.entry_point }}"

          $args = @(
            "--noconfirm",
            "--clean",
            "--windowed",
            "--onedir",
            "--name", "${{ steps.source.outputs.app_name }}",
            "--distpath", "dist",
            "--workpath", "build",
            "--paths", $sourceDir,
            $entry
          )

          # Include JSON configuration and metadata without hard-coding names.
          Get-ChildItem -Path $sourceDir -File -Filter "*.json" |
            ForEach-Object {
              $args = @("--add-data", "$($_.FullName);.") + $args
            }

          # Optional medical imaging dependencies are collected only when installed.
          $optionalCollect = @("pydicom")
          foreach ($package in $optionalCollect) {
            python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('$package') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $args = @("--collect-all", $package) + $args
            }
          }

          python -m PyInstaller @args

      - name: Build Nuitka standalone
        if: steps.source.outputs.build_engine == 'nuitka_standalone'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=dist_nuitka `
            --output-filename="${{ steps.source.outputs.exe_name }}" `
            "${{ steps.source.outputs.entry_point }}"

      - name: Stage single-layer Artifact
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $package = "artifact_payload"
          Remove-Item $package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          if ("${{ steps.source.outputs.build_engine }}" -eq "nuitka_standalone") {
            $distFolder = Get-ChildItem "dist_nuitka" -Directory |
              Where-Object { $_.Name -like "*.dist" } |
              Select-Object -First 1
            if (-not $distFolder) { throw "Nuitka dist folder not found." }
            Copy-Item "$($distFolder.FullName)\*" $package -Recurse -Force
          } else {
            $distFolder = Join-Path "dist" "${{ steps.source.outputs.app_name }}"
            if (-not (Test-Path $distFolder)) { throw "PyInstaller dist folder not found." }
            Copy-Item "$distFolder\*" $package -Recurse -Force
          }

          foreach ($name in @("README.md", "version.json")) {
            if (Test-Path $name) { Copy-Item $name "$package\$name" -Force }
          }

          Set-Content -Path "$package\BUILD_INFO.txt" -Encoding UTF8 -Value @(
            "Application=${{ steps.source.outputs.app_name }}",
            "Version=${{ steps.source.outputs.app_version }}",
            "Release=${{ steps.source.outputs.app_commit }}",
            "GitSHA=$env:GITHUB_SHA",
            "Branch=$env:GITHUB_REF_NAME",
            "Engine=${{ steps.source.outputs.build_engine }}",
            "Python=3.13",
            "BuildDateUTC=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))",
            "Runner=$env:RUNNER_OS"
          )

      - name: Upload versioned Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.source.outputs.artifact_prefix }}_${{ steps.source.outputs.app_version }}_${{ steps.source.outputs.app_commit }}_${{ steps.source.outputs.build_engine }}
          path: ${{ steps.source.outputs.source_dir }}/artifact_payload/*
          include-hidden-files: true
          if-no-files-found: error
          compression-level: 6
          retention-days: 14
