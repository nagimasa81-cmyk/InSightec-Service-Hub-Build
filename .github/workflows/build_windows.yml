name: Universal Module Build v4

on:
  workflow_dispatch:
    inputs:
      build_engine:
        description: Build engine
        required: true
        default: auto
        type: choice
        options:
          - auto
          - fast_pyinstaller
          - nuitka_standalone

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest SOURCE ZIP
        id: source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = $env:GITHUB_WORKSPACE

          $zip = Get-ChildItem -Path $root -Recurse -File -Filter "*_SOURCE.zip" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $zip) {
            throw "No *_SOURCE.zip file was found in the repository."
          }

          $sourceDir = Join-Path $env:RUNNER_TEMP "resolved_source"
          Remove-Item $sourceDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $sourceDir | Out-Null
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $sourceDir -Force

          Write-Host "Selected SOURCE ZIP: $($zip.FullName)"
          Write-Host "Extracted to: $sourceDir"

          "source_dir=$sourceDir" >> $env:GITHUB_OUTPUT
          "source_zip_name=$($zip.BaseName)" >> $env:GITHUB_OUTPUT

      - name: Resolve metadata, entry point, and build strategy
        id: meta
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $ErrorActionPreference = "Stop"
          $sourceDir = (Get-Location).Path
          $zipBase = "${{ steps.source.outputs.source_zip_name }}" -replace "_SOURCE$", ""

          $meta = $null
          $versionFile = Get-ChildItem -Path $sourceDir -Recurse -File -Filter "version.json" |
            Select-Object -First 1
          if ($versionFile) {
            try {
              $meta = Get-Content $versionFile.FullName -Raw | ConvertFrom-Json
              Write-Host "Using metadata: $($versionFile.FullName)"
            } catch {
              Write-Warning "version.json could not be parsed. Automatic fallback will be used."
            }
          }

          function Value-Or {
            param([object]$Value, [string]$Fallback)
            if ($null -eq $Value) { return $Fallback }
            $text = [string]$Value
            if ([string]::IsNullOrWhiteSpace($text)) { return $Fallback }
            return $text
          }

          $fallbackApp = $zipBase
          $fallbackVersion = "Unknown"
          $fallbackCommit = "Unknown"

          if ($zipBase -match "^(?<app>.+?)_(?<version>v?\d+(?:\.\d+){1,3}|Ver[^_]+)_(?<commit>.+)$") {
            $fallbackApp = $Matches["app"]
            $fallbackVersion = $Matches["version"]
            $fallbackCommit = $Matches["commit"]
          } elseif ($zipBase -match "^(?<app>.+?)_(?<commit>Commit\d+(?:_[A-Za-z0-9.-]+)*)$") {
            $fallbackApp = $Matches["app"]
            $fallbackCommit = $Matches["commit"]
          }

          $appName = Value-Or $meta.app_name $fallbackApp
          $appVersion = Value-Or $meta.version $fallbackVersion
          $appCommit = Value-Or $meta.commit $fallbackCommit
          $artifactPrefix = Value-Or $meta.artifact_prefix $appName
          $exeName = Value-Or $meta.exe_name "$appName.exe"
          $entryPoint = Value-Or $meta.entry_point ""
          $preferredEngine = Value-Or $meta.build_engine "fast_pyinstaller"

          $requestedEngine = "${{ github.event.inputs.build_engine }}"
          if ([string]::IsNullOrWhiteSpace($requestedEngine) -or $requestedEngine -eq "auto") {
            $buildEngine = $preferredEngine
          } else {
            $buildEngine = $requestedEngine
          }
          if ($buildEngine -notin @("fast_pyinstaller", "nuitka_standalone")) {
            $buildEngine = "fast_pyinstaller"
          }

          # BAT files are intentionally ignored in v4.
          # First prefer a valid SPEC file.
          $specFile = Get-ChildItem -Path $sourceDir -Recurse -File -Filter "*.spec" |
            Where-Object { $_.FullName -notmatch "\\(build|dist|venv|\.venv|site-packages)\\" } |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          $buildMode = if ($specFile) { "spec" } else { "python" }

          # Resolve entry point from metadata.
          if (-not [string]::IsNullOrWhiteSpace($entryPoint)) {
            $entryCandidate = Join-Path $sourceDir $entryPoint
            if (-not (Test-Path $entryCandidate)) {
              Write-Warning "version.json entry point was not found: $entryPoint"
              $entryPoint = ""
            }
          }

          # Resolve common Python filenames recursively.
          if ([string]::IsNullOrWhiteSpace($entryPoint)) {
            foreach ($name in @("app.py", "main.py", "run.py", "start.py", "launcher.py", "__main__.py")) {
              $candidate = Get-ChildItem -Path $sourceDir -Recurse -File -Filter $name |
                Where-Object { $_.FullName -notmatch "\\(build|dist|venv|\.venv|site-packages|tests?|examples?)\\" } |
                Select-Object -First 1
              if ($candidate) {
                $entryPoint = $candidate.FullName.Substring($sourceDir.Length).TrimStart('\')
                break
              }
            }
          }

          # Score every remaining Python file when names are non-standard.
          if ([string]::IsNullOrWhiteSpace($entryPoint)) {
            $bestFile = $null
            $bestScore = -1

            $pythonFiles = Get-ChildItem -Path $sourceDir -Recurse -File -Filter "*.py" |
              Where-Object {
                $_.FullName -notmatch "\\(build|dist|venv|\.venv|site-packages|tests?|examples?|__pycache__)\\" -and
                $_.Name -notmatch "^(setup|version|vendor_|artifact_|tracker_)"
              }

            foreach ($file in $pythonFiles) {
              $content = Get-Content $file.FullName -Raw -ErrorAction SilentlyContinue
              if ($null -eq $content) { continue }

              $score = 0
              if ($content -match 'if\s+__name__\s*==\s*["'']__main__["'']') { $score += 100 }
              if ($content -match '\bQApplication\s*\(') { $score += 60 }
              if ($content -match '\bQMainWindow\b') { $score += 30 }
              if ($content -match '\bTk\s*\(') { $score += 50 }
              if ($content -match '\bwx\.App\s*\(') { $score += 50 }
              if ($content -match '\bdef\s+main\s*\(') { $score += 40 }
              if ($content -match '\.show\s*\(') { $score += 20 }
              if ($file.Name -match '(app|main|run|start|launcher|analyzer)') { $score += 20 }
              if ($content -match 'PySide6|PyQt6|PyQt5|tkinter') { $score += 20 }

              if ($score -gt $bestScore) {
                $bestScore = $score
                $bestFile = $file
              }
            }

            if ($bestFile -and $bestScore -gt 0) {
              $entryPoint = $bestFile.FullName.Substring($sourceDir.Length).TrimStart('\')
              Write-Host "Auto-selected entry point: $entryPoint (score=$bestScore)"
            }
          }

          if (-not $specFile -and [string]::IsNullOrWhiteSpace($entryPoint)) {
            throw "No valid Python entry point or PyInstaller SPEC was found."
          }

          # Find the closest requirements file.
          $requirements = Get-ChildItem -Path $sourceDir -Recurse -File |
            Where-Object { $_.Name -match "^requirements.*\.txt$" } |
            Sort-Object @{
              Expression = {
                if ($_.Name -eq "requirements.txt") { 0 }
                elseif ($_.Name -match "build") { 2 }
                else { 1 }
              }
            }, FullName |
            Select-Object -First 1

          Write-Host "Application : $appName"
          Write-Host "Version     : $appVersion"
          Write-Host "Commit      : $appCommit"
          Write-Host "Build mode  : $buildMode"
          Write-Host "Entry point : $entryPoint"
          Write-Host "SPEC file   : $($specFile.FullName)"
          Write-Host "Engine      : $buildEngine"
          Write-Host "Requirements: $($requirements.FullName)"

          "app_name=$appName" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "app_commit=$appCommit" >> $env:GITHUB_OUTPUT
          "artifact_prefix=$artifactPrefix" >> $env:GITHUB_OUTPUT
          "exe_name=$exeName" >> $env:GITHUB_OUTPUT
          "entry_point=$entryPoint" >> $env:GITHUB_OUTPUT
          "build_engine=$buildEngine" >> $env:GITHUB_OUTPUT
          "build_mode=$buildMode" >> $env:GITHUB_OUTPUT
          "spec_file=$($specFile.FullName)" >> $env:GITHUB_OUTPUT
          "requirements=$($requirements.FullName)" >> $env:GITHUB_OUTPUT

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m pip install --upgrade pip

          $requirements = "${{ steps.meta.outputs.requirements }}"
          if (-not [string]::IsNullOrWhiteSpace($requirements) -and (Test-Path $requirements)) {
            python -m pip install -r $requirements
          } else {
            Write-Warning "No requirements file was found."
          }

          if ("${{ steps.meta.outputs.build_engine }}" -eq "nuitka_standalone") {
            python -m pip install nuitka ordered-set zstandard
          } else {
            python -m pip install pyinstaller
          }

      - name: Validate Python entry
        if: steps.meta.outputs.entry_point != ''
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m py_compile "${{ steps.meta.outputs.entry_point }}"

      - name: Build detected SPEC
        if: steps.meta.outputs.build_mode == 'spec'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m PyInstaller --noconfirm --clean "${{ steps.meta.outputs.spec_file }}"

      - name: Build Python entry with PyInstaller
        if: steps.meta.outputs.build_mode == 'python' && steps.meta.outputs.build_engine == 'fast_pyinstaller'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $sourceDir = (Get-Location).Path
          $entry = Join-Path $sourceDir "${{ steps.meta.outputs.entry_point }}"

          $args = @(
            "--noconfirm",
            "--clean",
            "--windowed",
            "--onedir",
            "--name", "${{ steps.meta.outputs.app_name }}",
            "--distpath", "dist",
            "--workpath", "build",
            "--paths", $sourceDir,
            $entry
          )

          # Include JSON, UI, icons, and common resources automatically.
          foreach ($pattern in @("*.json", "*.ui", "*.ico", "*.png", "*.jpg", "*.jpeg")) {
            Get-ChildItem -Path $sourceDir -Recurse -File -Filter $pattern |
              Where-Object { $_.FullName -notmatch "\\(build|dist|venv|\.venv|site-packages)\\" } |
              ForEach-Object {
                $relativeParent = $_.Directory.FullName.Substring($sourceDir.Length).TrimStart('\')
                $destination = if ([string]::IsNullOrWhiteSpace($relativeParent)) { "." } else { $relativeParent }
                $args = @("--add-data", "$($_.FullName);$destination") + $args
              }
          }

          foreach ($package in @("pydicom", "PySide6", "pyqtgraph", "matplotlib", "numpy", "openpyxl")) {
            python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('$package') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $args = @("--collect-all", $package) + $args
            }
          }

          python -m PyInstaller @args

      - name: Build Python entry with Nuitka
        if: steps.meta.outputs.build_mode == 'python' && steps.meta.outputs.build_engine == 'nuitka_standalone'
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=dist_nuitka `
            --output-filename="${{ steps.meta.outputs.exe_name }}" `
            "${{ steps.meta.outputs.entry_point }}"

      - name: Locate build output
        id: output
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $sourceDir = (Get-Location).Path

          $exe = Get-ChildItem -Path $sourceDir -Recurse -File -Filter "*.exe" |
            Where-Object {
              $_.FullName -notmatch "\\(venv|\.venv|site-packages|__pycache__)\\" -and
              $_.Name -notmatch "^(python|pip|windeployqt)"
            } |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $exe) {
            throw "Build completed, but no EXE was found."
          }

          Write-Host "Detected EXE: $($exe.FullName)"
          Write-Host "Output folder: $($exe.Directory.FullName)"

          "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "output_dir=$($exe.Directory.FullName)" >> $env:GITHUB_OUTPUT

      - name: Stage single-layer Artifact
        shell: pwsh
        working-directory: ${{ steps.source.outputs.source_dir }}
        run: |
          $package = "artifact_payload"
          Remove-Item $package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          $outputDir = "${{ steps.output.outputs.output_dir }}"
          Copy-Item "$outputDir\*" $package -Recurse -Force

          foreach ($name in @("README.md", "version.json")) {
            $candidate = Get-ChildItem -Path (Get-Location).Path -Recurse -File -Filter $name |
              Select-Object -First 1
            if ($candidate) {
              Copy-Item $candidate.FullName "$package\$name" -Force
            }
          }

          Set-Content -Path "$package\BUILD_INFO.txt" -Encoding UTF8 -Value @(
            "Application=${{ steps.meta.outputs.app_name }}",
            "Version=${{ steps.meta.outputs.app_version }}",
            "Release=${{ steps.meta.outputs.app_commit }}",
            "GitSHA=$env:GITHUB_SHA",
            "Branch=$env:GITHUB_REF_NAME",
            "BuildMode=${{ steps.meta.outputs.build_mode }}",
            "Engine=${{ steps.meta.outputs.build_engine }}",
            "EntryPoint=${{ steps.meta.outputs.entry_point }}",
            "Python=3.13",
            "BuildDateUTC=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          )

      - name: Upload versioned Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_prefix }}_${{ steps.meta.outputs.app_version }}_${{ steps.meta.outputs.app_commit }}_${{ steps.meta.outputs.build_engine }}
          path: ${{ steps.source.outputs.source_dir }}/artifact_payload/*
          include-hidden-files: true
          if-no-files-found: error
          compression-level: 6
          retention-days: 14
