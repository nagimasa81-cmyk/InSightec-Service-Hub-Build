name: Build All Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - Complaint_service_hub
          - InSightec_Service_hub
          - Log_explorer
          - Water_system_analyzer

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        shell: cmd
        run: |
          python -m pip install --upgrade pip

      - name: Extract Latest ZIP and Detect Build BAT
        shell: powershell
        run: |

          $ErrorActionPreference="Stop"

          $module="${{ matrix.module }}"

          $modulePath="Module/$module"

          $work="$modulePath/work"

          if(!(Test-Path $modulePath)){
              throw "Module not found : $modulePath"
          }

          $zips=Get-ChildItem $modulePath -Recurse -Filter *.zip |
              Where-Object{$_.FullName -notmatch "\\work\\"} |
              Sort-Object LastWriteTime -Descending

          if($zips.Count -eq 0){
              throw "No zip found."
          }

          $zip=$zips[0]

          Write-Host ""
          Write-Host "=================================="
          Write-Host "Module : $module"
          Write-Host "ZIP    : $($zip.Name)"
          Write-Host "=================================="

          if(Test-Path $work){
              Remove-Item $work -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $work | Out-Null

          Expand-Archive $zip.FullName $work -Force

          Write-Host ""
          Write-Host "Searching BAT..."
          Write-Host ""

          Get-ChildItem $work -Recurse -Filter *.bat | ForEach-Object{
              Write-Host $_.FullName
          }

          $bat=Get-ChildItem $work -Recurse -Filter *.bat |
              Where-Object{
                  $_.Name -match "BUILD" -or
                  $_.Name -match "build" -or
                  $_.Name -match "^01_"
              } |
              Select-Object -First 1

          if($null -eq $bat){
              throw "No build bat found."
          }

          "BUILD_PATH=$($bat.DirectoryName)" | Out-File $env:GITHUB_ENV -Append

          "BUILD_BAT=$($bat.Name)" | Out-File $env:GITHUB_ENV -Append

          Write-Host ""
          Write-Host "BAT : $($bat.FullName)"
          Write-Host ""

      - name: Install requirements
        shell: cmd
        run: |

          cd /d "%BUILD_PATH%"

          if exist requirements.txt (
              pip install -r requirements.txt
          )

          pip install pyinstaller nuitka ordered-set zstandard

      - name: Run Build BAT
        shell: cmd
        run: |

          cd /d "%BUILD_PATH%"

          echo Running %BUILD_BAT%

          call "%BUILD_BAT%"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}

          path: |
            Module/${{ matrix.module }}/work/**/*.exe
            Module/${{ matrix.module }}/work/**/*.zip
            Module/${{ matrix.module }}/work/**/dist/**
            Module/${{ matrix.module }}/work/**/release/**
            Module/${{ matrix.module }}/work/**/output/**
            Module/${{ matrix.module }}/work/**/build/**

          if-no-files-found: ignore
