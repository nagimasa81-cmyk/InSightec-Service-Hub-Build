name: Build All Modules Latest ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - Complaint_service_hub
          - InSightec_Service_hub
          - Log_explorer
          - Water_system_analyzer

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        shell: cmd
        run: python -m pip install --upgrade pip

      - name: Extract Latest ZIP and Detect Build BAT
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $module = "${{ matrix.module }}"
          $modulePath = "Module/$module"
          $work = "$modulePath/work"
          $envFile = $env:GITHUB_ENV

          if (!(Test-Path $modulePath)) {
            throw "Module folder not found: $modulePath"
          }

          $zips = Get-ChildItem -Path $modulePath -Recurse -Filter *.zip |
            Where-Object {
              $_.FullName -notlike "*\work\*" -and
              $_.FullName -notlike "*/work/*"
            } |
            Sort-Object LastWriteTime -Descending

          if ($zips.Count -eq 0) {
            throw "No ZIP file found under: $modulePath"
          }

          $latestZip = $zips[0]

          Write-Host "======================================"
          Write-Host "Module : $module"
          Write-Host "ZIP    : $($latestZip.FullName)"
          Write-Host "======================================"

          if (Test-Path $work) {
            Remove-Item $work -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $work | Out-Null
          Expand-Archive -Path $latestZip.FullName -DestinationPath $work -Force

          Write-Host "Extracted BAT files:"
          Get-ChildItem -Path $work -Recurse -Filter *.bat | ForEach-Object {
            Write-Host $_.FullName
          }

          $batFiles = Get-ChildItem -Path $work -Recurse -Filter *.bat |
            Where-Object {
              $_.Name -match "(?i)build" -or
              $_.Name -match "(?i)exe" -or
              $_.Name -match "^01_"
            } |
            Sort-Object FullName

          if ($batFiles.Count -eq 0) {
            throw "No build BAT found."
          }

          $buildBat = $batFiles[0]
          $buildPath = $buildBat.DirectoryName

          Write-Host "======================================"
          Write-Host "Build BAT  : $($buildBat.FullName)"
          Write-Host "Build Path : $buildPath"
          Write-Host "======================================"

          "BUILD_PATH=$buildPath" | Out-File -FilePath $envFile -Append -Encoding utf8
          "BUILD_BAT=$($buildBat.Name)" | Out-File -FilePath $envFile -Append -Encoding utf8

      - name: Install requirements
        shell: cmd
        run: |
          cd /d "%BUILD_PATH%"

          if exist requirements.txt (
            pip install -r requirements.txt
          )

          pip install pyinstaller nuitka ordered-set zstandard

      - name: Run Build BAT
        shell: cmd
        run: |
          cd /d "%BUILD_PATH%"
          echo Running %BUILD_BAT%
          call "%BUILD_BAT%"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}_build
          path: |
            Module/${{ matrix.module }}/work/**/*.exe
            Module/${{ matrix.module }}/work/**/*.zip
            Module/${{ matrix.module }}/work/**/dist/**
            Module/${{ matrix.module }}/work/**/release/**
            Module/${{ matrix.module }}/work/**/output/**
            Module/${{ matrix.module }}/work/**/build/**
          if-no-files-found: ignore
