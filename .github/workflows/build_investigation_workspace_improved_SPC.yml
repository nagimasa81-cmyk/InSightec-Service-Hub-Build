name: Build Selected Module (SPC Ready)

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: "Module folder under Module"
        required: true
        default: "SPC"
        type: choice
        options:
          - "SPC"
      python_version:
        description: "Python version"
        required: true
        default: "3.13"
        type: choice
        options:
          - "3.13"
          - "3.14"
  push:
    branches: [main, master]
    paths:
      - "Module/SPC/**"
      - ".github/workflows/build_investigation_workspace_improved_SPC.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      NUITKA_ASSUME_YES_FOR_DOWNLOADS: "yes"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve module
        id: module
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $moduleName = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.module_name }}"
          } else {
            "SPC"
          }

          $moduleDir = Join-Path $env:GITHUB_WORKSPACE ("Module\" + $moduleName)
          $sourceZip = Join-Path $moduleDir "source.zip"

          if (-not (Test-Path $moduleDir)) {
            throw "Module folder not found: $moduleDir"
          }
          if (-not (Test-Path $sourceZip)) {
            throw "source.zip not found: $sourceZip"
          }

          "module_name=$moduleName" | Out-File $env:GITHUB_OUTPUT -Append
          "module_dir=$moduleDir" | Out-File $env:GITHUB_OUTPUT -Append
          "source_zip=$sourceZip" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Module: $moduleName"
          Write-Host "Source: $sourceZip"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.13' }}
          architecture: x64
          cache: pip

      - name: Upgrade build tools
        shell: pwsh
        run: |
          python --version
          python -m pip install --upgrade pip setuptools wheel ordered-set zstandard

      - name: Extract module source
        id: extract
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $extractRoot = Join-Path $env:RUNNER_TEMP "SPC_source"
          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          Expand-Archive -Path "${{ steps.module.outputs.source_zip }}" -DestinationPath $extractRoot -Force

          $children = @(Get-ChildItem $extractRoot -Force)
          if ($children.Count -eq 1 -and $children[0].PSIsContainer) {
            $buildRoot = $children[0].FullName
          } else {
            $buildRoot = $extractRoot
          }

          "build_root=$buildRoot" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Build root: $buildRoot"
          Get-ChildItem $buildRoot -Force

      - name: Install requirements
        shell: pwsh
        working-directory: ${{ steps.extract.outputs.build_root }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            python -m pip install "PySide6>=6.8" "matplotlib>=3.9" "numpy>=2.0" "Nuitka>=2.7"
          }
          python -m pip install --upgrade Nuitka ordered-set zstandard

      - name: Validate Python source
        shell: pwsh
        working-directory: ${{ steps.extract.outputs.build_root }}
        run: |
          python -m py_compile app.py main.py
          python -c "from fus_spectrum_core import discover_input, parse_spectrum_dump; print('SPC core import OK')"

      - name: Prepare build BAT for CI
        shell: pwsh
        working-directory: ${{ steps.extract.outputs.build_root }}
        run: |
          $ErrorActionPreference = "Stop"
          $bat = Join-Path (Get-Location) "01_BUILD_EXE_NUITKA.bat"
          if (-not (Test-Path $bat)) {
            throw "01_BUILD_EXE_NUITKA.bat was not found in source.zip"
          }
          $content = Get-Content $bat -Raw
          $content = $content -replace '(?im)^\s*pause\s*$', 'rem pause removed for CI'
          Set-Content -Path $bat -Value $content -Encoding ASCII
          Get-Content $bat

      - name: Build SPC EXE
        shell: cmd
        working-directory: ${{ steps.extract.outputs.build_root }}
        run: |
          set NUITKA_ASSUME_YES_FOR_DOWNLOADS=yes
          call 01_BUILD_EXE_NUITKA.bat

      - name: Collect distribution
        id: collect
        shell: pwsh
        working-directory: ${{ steps.extract.outputs.build_root }}
        run: |
          $ErrorActionPreference = "Stop"
          $package = Join-Path $env:RUNNER_TEMP "SPC_package"
          if (Test-Path $package) {
            Remove-Item $package -Recurse -Force
          }
          New-Item -ItemType Directory -Path $package | Out-Null

          $exe = Get-ChildItem -Path . -Recurse -File -Filter "FUS_Spectrum_Analyzer.exe" |
            Select-Object -First 1
          if (-not $exe) {
            throw "FUS_Spectrum_Analyzer.exe was not produced."
          }

          Copy-Item $exe.FullName (Join-Path $package $exe.Name) -Force
          foreach ($name in @("README.md", "README_BUILD.md", "SHARED_INTEGRATION.md", "MODULE_INFO.json")) {
            if (Test-Path $name) {
              Copy-Item $name (Join-Path $package $name) -Force
            }
          }

          $pyVersion = (python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')")
          $zipPath = Join-Path $env:RUNNER_TEMP "SPC_FUS_Spectrum_Analyzer_Py$pyVersion.zip"
          Compress-Archive -Path (Join-Path $package "*") -DestinationPath $zipPath -Force

          "artifact_path=$zipPath" | Out-File $env:GITHUB_OUTPUT -Append
          "artifact_name=SPC-FUS-Spectrum-Analyzer-Python-$pyVersion" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Artifact: $zipPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.artifact_name }}
          path: ${{ steps.collect.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
